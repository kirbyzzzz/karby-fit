<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>אימון משקולות 💪</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest-db.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="משקולות">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#000;--bg2:#111;--bg3:#1a1a1a;
  --txt:#fff;--txt2:#888;--txt3:#555;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --acc:#AFA9EC;--acc2:#7F77DD;--acc3:#534AB7;
  --acc-bg:rgba(175,169,236,0.1);--acc-bd:rgba(175,169,236,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);direction:rtl;max-width:640px;margin:0 auto;padding:14px 14px 90px;font-size:15px}
button{cursor:pointer;font-family:inherit;font-size:14px;border-radius:10px;border:0.5px solid var(--bdr2);background:var(--bg2);color:var(--txt);padding:9px 16px;transition:opacity .15s}
button:active{opacity:.6}
input{font-family:inherit;font-size:14px;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:10px;padding:10px 13px;color:var(--txt);width:100%}
input:focus{outline:none;border-color:var(--acc-bd)}
input::placeholder{color:var(--txt3)}
.tab-bar{position:fixed;bottom:0;right:0;left:0;background:#111;border-top:0.5px solid #222;display:flex;z-index:99;max-width:640px;margin:auto;padding-bottom:env(safe-area-inset-bottom,6px)}
.tb{flex:1;border:none;background:transparent;padding:10px 4px 8px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt3);border-radius:0}
.tb.on{color:var(--acc);font-weight:500}
.tbi{font-size:22px;line-height:1}
.ex-row{background:var(--bg2);border-radius:14px;margin-bottom:6px;overflow:hidden}
.ex-head{padding:13px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.ex-body{display:none;padding:0 15px 14px;border-top:0.5px solid var(--bdr)}
.ex-body.open{display:block}
.step{display:flex;gap:8px;margin-bottom:5px;font-size:13px;line-height:1.6;color:var(--txt2)}
.sn{color:var(--txt3);min-width:14px;font-size:11px;margin-top:2px}
.tip{background:var(--bg3);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--txt2);margin-top:8px}
.yt{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;border-radius:20px;background:rgba(200,30,30,0.08);border:0.5px solid rgba(200,30,30,0.3);text-decoration:none;color:var(--txt);white-space:nowrap;margin-top:10px}
.card{background:var(--bg2);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.sec{font-size:12px;font-weight:500;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin:16px 0 8px}
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:4px 11px;font-size:12px;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--txt2)}
.done-big{width:100%;padding:15px;font-size:15px;font-weight:500;border-radius:14px;margin:10px 0;background:var(--acc2);border:none;color:#fff}
.done-big.done{background:var(--acc-bg);border:0.5px solid var(--acc-bd);color:var(--acc)}
.food-chip{padding:7px 13px;border-radius:20px;font-size:13px;background:var(--bg2);border:0.5px solid var(--bdr2);color:var(--txt2)}
.food-item{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:var(--bg2);border-radius:10px;margin-bottom:4px;font-size:13px}
.rm{border:none;background:transparent;color:var(--txt3);font-size:14px;padding:2px 6px;cursor:pointer}
.stat{background:var(--bg2);border-radius:12px;padding:14px;text-align:center}
.stat-n{font-size:26px;font-weight:600;color:var(--acc)}
.stat-l{font-size:11px;color:var(--txt3);margin-top:2px}
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:6px 0 14px}
.pbf{height:100%;background:var(--acc2);border-radius:3px}
.hmc{height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--txt3)}
.set-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--bdr)}
.set-row:last-child{border-bottom:none}
#tw{display:none;position:fixed;bottom:70px;right:0;left:0;max-width:640px;margin:auto;padding:0 14px;z-index:98}
#tw-inner{background:#1a1a2e;border:0.5px solid var(--acc-bd);border-radius:18px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
#tw-num{font-size:44px;font-weight:700;letter-spacing:-2px;line-height:1;color:var(--acc)}
#tw-lbl{font-size:11px;color:var(--txt3);margin-bottom:3px}
#tw-sub{font-size:10px;color:var(--txt3);margin-top:2px}

/* Fullscreen timer overlay */
#tov{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,5,8,0.98);backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:24px}
#tov.on{display:flex}
#tov-ctx{font-size:15px;color:var(--acc);font-weight:500;letter-spacing:.3px;text-align:center}
#tov-ring{position:relative;width:min(74vw,300px);aspect-ratio:1}
#tov-ring svg{width:100%;height:100%}
#tov-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(52px,16vw,88px);font-weight:700;letter-spacing:-3px;color:#fff}
#tov-name{font-size:15px;color:var(--txt2);text-align:center;max-width:90%}
#tov-ctrls{display:flex;gap:14px;align-items:center}
#tov-ctrls button{width:64px;height:64px;border-radius:50%;font-size:16px;font-weight:600;background:var(--bg2);border:0.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center}
#tov-pause{font-size:24px!important}
#tov-done{padding:15px 36px;border-radius:24px;font-size:16px;font-weight:600;background:var(--acc2);border:none;color:#fff}
#tov-skip{padding:11px 26px;border-radius:24px;font-size:14px;font-weight:500;background:var(--bg2);border:0.5px solid var(--bdr2);color:var(--txt2)}

/* Progress photo prompt */
#pp{display:none;position:fixed;inset:0;z-index:210;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:24px}
#pp.on{display:flex}
#pp-card{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:22px;padding:26px 22px;text-align:center;max-width:340px;width:100%}
#pp-emoji{font-size:46px;margin-bottom:6px}
#pp-title{font-size:18px;font-weight:600;margin-bottom:6px}
#pp-sub{font-size:13px;color:var(--txt2);margin-bottom:18px;line-height:1.5}
#pp-shot{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:500;background:var(--acc2);border:none;color:#fff;margin-bottom:8px}
#pp-later{width:100%;padding:11px;border-radius:14px;font-size:13px;color:var(--txt3);background:transparent;border:none}
#pp-thumb img{width:100%;border-radius:14px;margin-top:12px}

/* Water + notes + badges + photos */
.wbtn{width:42px;height:42px;border-radius:50%;font-size:20px;font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--acc)}
.note-chip{padding:7px 13px;border-radius:20px;font-size:13px;background:var(--bg2);border:0.5px solid var(--bdr2);color:var(--txt2)}
.note-chip.on{background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)}
.badge{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;background:var(--bg2);border:0.5px solid var(--bdr);text-align:center}
.badge.lk{opacity:.35;filter:grayscale(1)}
.badge-i{font-size:26px;line-height:1}
.badge-t{font-size:9px;color:var(--txt3);line-height:1.2}
.badge.un .badge-t{color:var(--acc)}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ph-cell{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg3)}
.ph-cell img{width:100%;height:100%;object-fit:cover}
.ph-day{position:absolute;bottom:0;right:0;left:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));color:#fff;font-size:9px;padding:8px 5px 3px;text-align:center}
.ph-del{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:215;overflow:hidden}
.cft{position:absolute;width:9px;height:14px;top:-20px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(104vh) rotate(720deg);opacity:.9}}
</style>
</head>
<body>

<div id="pg-today"></div>
<div id="pg-prog" style="display:none"></div>

<!-- Fullscreen timer -->
<div id="tov">
  <div id="tov-ctx"></div>
  <div id="tov-ring">
    <svg viewBox="0 0 220 220">
      <circle cx="110" cy="110" r="100" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="11"/>
      <circle id="tov-arc" cx="110" cy="110" r="100" fill="none" stroke="var(--acc2)" stroke-width="11" stroke-linecap="round" transform="rotate(-90 110 110)" stroke-dasharray="628" stroke-dashoffset="0"/>
    </svg>
    <div id="tov-num">0</div>
  </div>
  <div id="tov-name"></div>
  <div id="tov-ctrls">
    <button onclick="adjTimer(-15)">−15</button>
    <button id="tov-pause" onclick="pauseTimer()">⏸</button>
    <button onclick="adjTimer(15)">+15</button>
  </div>
  <button id="tov-done">✓ סיימתי את הסט</button>
  <button id="tov-skip" onclick="skipTimer()">דלג ←</button>
</div>

<!-- Progress photo prompt -->
<div id="pp">
  <div id="pp-card">
    <div id="pp-emoji">🎉</div>
    <div id="pp-title">כל הכבוד! סיימת את האימון</div>
    <div id="pp-sub">צלם תמונת התקדמות — ככה תראה את השינוי בגוף לאורך הזמן.</div>
    <button id="pp-shot" onclick="pickPhoto()">📸 צלם תמונה</button>
    <button id="pp-later" onclick="closePP()">אחר כך</button>
    <div id="pp-thumb"></div>
  </div>
</div>
<input type="file" accept="image/*" capture="user" id="photo-input" style="display:none" onchange="handlePhotoPick(this)">
<div id="confetti"></div>

<div class="tab-bar">
  <button class="tb on" id="btn-today" onclick="gotoTab('today')"><span class="tbi">🏋️</span>האימון</button>
  <button class="tb" id="btn-prog" onclick="gotoTab('prog')"><span class="tbi">📊</span>התקדמות</button>
</div>

<script>
const SCHED=[
  {d:1,t:'upper',wk:1},{d:2,t:'lower',wk:1},{d:3,t:'core',wk:1},{d:4,t:'rest',wk:1},
  {d:5,t:'upper',wk:1},{d:6,t:'lower',wk:1},{d:7,t:'core',wk:1},
  {d:8,t:'rest',wk:2},{d:9,t:'upper',wk:2},{d:10,t:'lower',wk:2},{d:11,t:'core',wk:2},
  {d:12,t:'rest',wk:2},{d:13,t:'upper',wk:2},{d:14,t:'lower',wk:2},
  {d:15,t:'core',wk:3},{d:16,t:'rest',wk:3},{d:17,t:'upper',wk:3},{d:18,t:'lower',wk:3},
  {d:19,t:'core',wk:3},{d:20,t:'rest',wk:3},{d:21,t:'upper',wk:3},
  {d:22,t:'lower',wk:4},{d:23,t:'core',wk:4},{d:24,t:'rest',wk:4},{d:25,t:'upper',wk:4},
  {d:26,t:'lower',wk:4},{d:27,t:'core',wk:4},{d:28,t:'rest',wk:4},
  {d:29,t:'upper',wk:4},{d:30,t:'lower',wk:4}
];
const TNAMES={upper:'גוף עליון',lower:'גוף תחתון',core:'ליבה',rest:'מנוחה אקטיבית'};
const TEMOJI={upper:'💪',lower:'🦵',core:'⚡',rest:'🧘'};
const WARMUP=[{n:'קפיצות במקום',t:30},{n:'מעגולי ידיים',t:20},{n:'מעגולי ירכיים',t:20},{n:'Cat-cow',t:30},{n:'Leg swings',t:20}];
const FOODS=['ביצים','קוטג׳','לחם','אורז','עוף','שיבולת שועל','בננה','טונה','גבינה','פסטה'];
const NOTES=['💪 מלא אנרגיה','🔥 אימון מעולה','✅ הגב הרגיש טוב','😮‍💨 היה קשה','📈 התחזקתי','😴 הייתי עייף','⚠️ כאב גב','🏋️ העליתי משקל'];

// v: ['סטים×חזרות', 'משקל', מנוחה_שניות]  ×3 (שב׳1-2 / שב׳3 / שב׳4)
// timed:true → סט על זמן (פלאנק וכד')
const WKT={
  upper:[
    {n:'Dumbbell floor press',m:'חזה · טריצפס',
     v:[['3×8','5 קג',45],['3×10','5 קג',45],['4×10','5 קג',50]],
     steps:['שכב, משקולת בכל יד בגובה החזה, מרפקים ב-45°',
            'גוף שטוח — עורף, גב, ישבן ורגליים על הרצפה',
            'דחוף למעלה עד שמרפקים כמעט ישרים',
            'תרד לאט — 3 שניות לכיוון מטה'],
     tip:'על הרצפה = טווח מוגבל = בטוח יותר לכתפיים',
     yt:'https://www.youtube.com/results?search_query=dumbbell+floor+press+beginner'},
    {n:'Bent-over row',m:'גב · ביצפס',
     v:[['3×8','5 קג',45],['3×10','5 קג',45],['4×10','5 קג',50]],
     steps:['כופף קדימה 45°, גב ישר, ברכיים מעט כפופות',
            'משקולות תלויות לפניך, ידיים ישרות',
            'משוך לכיוון הבטן — מרפקים אחורה ולמעלה',
            'הדק שרירי הגב, תרד לאט'],
     tip:'גב ישר תמיד — לא מתכופף ולא מקמר',
     yt:'https://www.youtube.com/results?search_query=dumbbell+bent+over+row+proper+form'},
    {n:'Shoulder press',m:'כתפיים · טריצפס',
     v:[['3×8','5 קג',45],['3×10','5 קג',45],['4×10','5 קג',50]],
     steps:['שב על כיסא, גב ישר ונשען',
            'משקולות בגובה האוזניים, מרפקים ב-90°',
            'דחוף ישר למעלה — לא "V" לצדדים',
            'תרד לאט לגובה הסנטר'],
     tip:'ישיבה = יציבות = פחות לחץ על הגב',
     yt:'https://www.youtube.com/results?search_query=seated+dumbbell+shoulder+press+beginner'},
    {n:'Bicep curl',m:'ביצפס',
     v:[['3×8','5 קג',40],['3×10','5 קג',40],['3×12','5 קג',40]],
     steps:['עמוד, ידיים לצדדים, כפות ידיים פונות קדימה',
            'כופף מרפק — הרם משקולת לכיוון הכתף',
            'הידק ביצפס בחוזקה למעלה',
            'תרד לאט — 3 שניות'],
     tip:'אל תנדנד את הגוף — הביצפס עושה הכל',
     yt:'https://www.youtube.com/results?search_query=dumbbell+bicep+curl+proper+form+beginner'},
    {n:'Overhead tricep extension',m:'טריצפס',
     v:[['2×8','1×5 קג',40],['3×8','1×5 קג',40],['3×10','1×5 קג',40]],
     steps:['תפוס משקולת אחת בשתי ידיים מאחורי הראש',
            'מרפקים צמודים לאוזניים — לא מתפזרים לצדדים',

     tip:'אחיזה בראש העליון של המשקולת — לא ב"גוף"',

    {n:'Lateral raise',m:'כתפיים צדדיות — שב׳ 3-4 בלבד',
     v:[null,['3×10','5 קג',40],['3×12','5 קג',40]],
     steps:['עמוד, ידיים לצדדים, מרפקים מעט כפופים',
            'הרם ידיים לצדדים עד גובה הכתפיים בדיוק',
            'החזק שנייה בחוזקה',
            'תרד לאט — 3 שניות'],
     tip:'5 קג זה הרבה ל-lateral raise — עדיף פחות מ-lateral',

  ],
  lower:[
    {n:'Goblet squat',m:'ירכיים · ישבן',
     v:[['3×10','5 קג',50],['3×12','5 קג',50],['4×12','5 קג',50]],
     steps:['אחוז משקולת אחת אנכית בשתי ידיים מול החזה',

            'שב עמוק, מרפקים בין הברכיים — דחוף ברכיים החוצה',
            'קום, לחץ עקבים, הדק ישבן'],
     tip:'המשקולת מול החזה מאפשרת ישיבה עמוקה יותר',
     yt:'https://www.youtube.com/results?search_query=goblet+squat+beginner+form'},
    {n:'Romanian deadlift',m:'ירכיים אחוריות · ישבן',
     v:[['3×10','5 קג',50],['3×12','5 קג',50],['4×12','5 קג',50]],
     steps:['עמוד, משקולות לפניך, ברכיים מעט כפופות (לא נעולות)',
            'הטה קדימה מהאגן — לא מהגב — גב ישר לחלוטין',
            'הורד משקולות לאורך הרגל עד שמרגיש מתח בירכיים האחוריות',
            'קום — הדק ישבן למעלה בחוזקה'],
     tip:'גב ישר תמיד. מרגיש מתיחה בירכיים? מושלם',
     yt:'https://www.youtube.com/results?search_query=dumbbell+romanian+deadlift+beginner'},
    {n:'Reverse lunge',m:'ירכיים · ישבן',
     v:[['2×8/רגל','5 קג',45],['3×8/רגל','5 קג',45],['3×10/רגל','5 קג',45]],
     steps:['עמוד, משקולת בכל יד, גוף זקוף',
            'צעד גדול אחורה עם רגל אחת',
            'רד עד שהברך האחורית כמעט נוגעת ברצפה',
            'קום דרך העקב הקדמי, החלף רגל'],
     tip:'מבט קדימה — עוזר לשיווי משקל',

    {n:'Sumo squat',m:'ירכיים פנימיות · ישבן',
     v:[['3×10','5 קג',45],['3×12','5 קג',45],['4×12','5 קג',45]],
     steps:['רגליים רחבות מאוד, בהונות פונות ב-45°',
            'אחוז משקולת אחת בשתי ידיים — תלויה בין הרגליים',
            'שב עמוק, גב ישר',
            'קום, הדק ישבן'],
     tip:'מצוין לחיזוק הצד הפנימי של הירך',

// ── Timer ─────────────────────────────────────────────
function parseSec(s){const m=(s||'').match(/\d+/);return m?+m[0]:0;}
function fmtSW(s){const m=Math.floor(s/60),ss=s%60;return`${m}:${ss.toString().padStart(2,'0')}`;}
function beep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.18,0.36].forEach(t=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0,ac.currentTime+t);
      g.gain.linearRampToValueAtTime(0.35,ac.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.28);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.35);
    });
  }catch(e){}
}

let T={mode:null,id:null,sec:0,total:0,cb:null,key:null,idx:null,paused:false};
// _exMap: populated during render — holds exercise metadata per key
const _exMap={};
const _ARC=628; // 2·π·100
function _tov(id){return document.getElementById(id);}
function cancelTimer(){if(T.id){clearInterval(T.id);T.id=null;}T.mode=null;T.cb=null;T.paused=false;_tov('tov').classList.remove('on');}
function _renderCD(){
  const el=_tov('tov-num');el.textContent=T.sec;
  el.style.color=T.sec<=5?'#E24B4A':T.sec<=10?'#EF9F27':'#fff';
  const arc=_tov('tov-arc');const frac=T.total>0?T.sec/T.total:0;
  arc.style.strokeDashoffset=(_ARC*(1-frac)).toFixed(1);
  arc.style.stroke=T.sec<=5?'#E24B4A':T.sec<=10?'#EF9F27':'var(--acc2)';
}
// Countdown (rest between sets, or timed hold)
function startCD(sec,lbl,onDone,name){
  if(T.id)clearInterval(T.id);
  T={mode:'cd',id:null,sec,total:sec,cb:onDone||null,paused:false};
  _tov('tov-ctx').textContent=lbl||'מנוחה 💤';
  _tov('tov-name').textContent=name||'';
  _tov('tov-pause').textContent='⏸';
  _tov('tov-ctrls').style.display='flex';
  _tov('tov-skip').style.display='block';
  _tov('tov-done').style.display='none';
  _tov('tov').classList.add('on');
  _renderCD();
  T.id=setInterval(()=>{
    if(T.paused)return;
    T.sec--;
    if(T.sec<=0){T.sec=0;_renderCD();const fn=T.cb;T.cb=null;clearInterval(T.id);T.id=null;_tov('tov').classList.remove('on');beep();if(fn)fn();}
    else _renderCD();
  },1000);
}
function pauseTimer(){if(T.mode!=='cd')return;T.paused=!T.paused;_tov('tov-pause').textContent=T.paused?'▶':'⏸';}
function adjTimer(n){if(T.mode!=='cd')return;T.sec=Math.max(1,T.sec+n);if(T.sec>T.total)T.total=T.sec;_renderCD();}
function skipTimer(){const fn=T.cb;T.cb=null;if(T.id){clearInterval(T.id);T.id=null;}T.paused=false;_tov('tov').classList.remove('on');if(fn)fn();}
// Stopwatch (count up) for a regular dumbbell set
function startSW(key,idx){
  const m=_exMap[key];if(!m)return;
  if(T.id)clearInterval(T.id);
  T={mode:'sw',id:null,sec:0,key,idx};
  _tov('tov-ctx').textContent=`סט ${idx+1} · ${m.n}`;
  _tov('tov-name').textContent='ספירת זמן הסט · לחץ "סיימתי" בסיום';
  _tov('tov-ctrls').style.display='none';
  _tov('tov-skip').style.display='none';
  _tov('tov-done').style.display='block';
  _tov('tov-done').onclick=finishSW;
  const arc=_tov('tov-arc');arc.style.strokeDashoffset=0;arc.style.stroke='var(--acc2)';
  _tov('tov-num').textContent=fmtSW(0);_tov('tov-num').style.color='#fff';
  _tov('tov').classList.add('on');
  T.id=setInterval(()=>{T.sec++;_tov('tov-num').textContent=fmtSW(T.sec);},1000);
}
function finishSW(){
  const elapsed=T.sec,key=T.key,idx=T.idx,m=_exMap[key];
  if(T.id){clearInterval(T.id);T.id=null;}
  const d=viewDay||getDay();
  saveSetTime(key,idx,elapsed);markSetDone(key,idx,fmtSW(elapsed));
  _tov('tov').classList.remove('on');beep();
  if(allSetsDone(d)){finishWorkout(d);return;}
  if(m&&m.rest)startCD(m.rest,'מנוחה 💤',null,m.n);
}
// Timed hold set (e.g. plank)
function startTimedSet(key,idx){
  const m=_exMap[key];if(!m)return;
  const d=viewDay||getDay();
  startCD(m.setDur,`סט ${idx+1} · החזקה 🧘`,()=>{
    saveSetTime(key,idx,m.setDur);markSetDone(key,idx,fmtSW(m.setDur));
    if(allSetsDone(d)){finishWorkout(d);return;}
    if(m&&m.rest)startCD(m.rest,'מנוחה 💤',null,m.n);
  },m.n);
}

function markSetDone(key,idx,label){
  const btn=document.getElementById(`sb-${key}-${idx}`);
  if(!btn)return;
  btn.textContent='✓ '+label;
  btn.style.cssText='color:var(--acc);font-size:11px;padding:5px 10px;border-radius:20px;border:0.5px solid rgba(175,169,236,0.3);background:rgba(175,169,236,0.08);cursor:default';
  btn.onclick=null;
}

let data={startDate:null,logs:{},wt:[]};
// Safe storage — falls back to in-memory if localStorage is blocked (e.g. data: URLs)
const LS=(()=>{
  let mem={},ok=true;
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');}catch(e){ok=false;}
  return{
    get:k=>{try{return ok?localStorage.getItem(k):(k in mem?mem[k]:null);}catch(e){return k in mem?mem[k]:null;}},
    set:(k,v)=>{try{ok?localStorage.setItem(k,v):(mem[k]=v);}catch(e){mem[k]=v;}}
  };
})();
function load(){try{const s=LS.get('myfit-db');if(s)data=JSON.parse(s);}catch(e){}}
function save(){try{LS.set('myfit-db',JSON.stringify(data));}catch(e){}}
function getDay(){
  if(!data.startDate){data.startDate=new Date().toISOString().split('T')[0];save();}
  const diff=Math.floor((Date.now()-new Date(data.startDate))/86400000)+1;
  return Math.min(30,Math.max(1,diff));
}
function getLog(d){
  if(!data.logs[d])data.logs[d]={done:false,food:[],sets:{},cals:0};
  if(!data.logs[d].sets)data.logs[d].sets={};
  return data.logs[d];
}
function getStreak(){let s=0;const d=getDay();for(let i=d;i>=1;i--){if(getLog(i).done)s++;else break;}return s;}
function saveSetTime(key,idx,t){
  const d=viewDay||getDay();const log=getLog(d);
  if(!log.sets[key])log.sets[key]=[];
  log.sets[key][idx]=t;save();
}
function getSetTime(key,idx){
  const d=viewDay||getDay();const log=getLog(d);
  if(!log.sets[key])return null;
  const v=log.sets[key][idx];return v===undefined?null:v;
}
function saveWt(v){const d=viewDay||getDay();data.wt=data.wt.filter(x=>x.d!==d);if(v){data.wt.push({d,w:parseFloat(v)});getLog(d).wt=parseFloat(v);}save();}
function saveSteps(v){const d=viewDay||getDay();getLog(d).steps=v?+v:null;save();}
function saveSleep(v){const d=viewDay||getDay();getLog(d).sleep=v?+v:null;save();}

    const onclickFn=isTimed?`startTimedSet('${key}',${i})`:`startSW('${key}',${i})`;
    const btnLabel=isTimed?`▶ ${setDur}ש׳`:'▶ התחל';
    h+=`<div class="set-row">
      <span style="font-size:12px;color:var(--txt3);min-width:40px">סט ${i+1}</span>
      <span style="font-size:13px;color:var(--txt2);flex:1">${repsStr}${weightLabel}</span>
      <span style="font-size:11px;color:var(--acc);min-width:45px;text-align:center">${isDone?fmtSW(saved):''}</span>
      <button id="${btnId}" onclick="${isDone?'':onclickFn}"
        style="border-radius:20px;font-size:11px;padding:5px 12px;${isDone?'color:var(--acc);border-color:rgba(175,169,236,0.3);background:rgba(175,169,236,0.08);cursor:default':'color:var(--acc);border-color:var(--acc-bd);background:var(--acc-bg)'}"
        ${isDone?'disabled':''}>
        ${isDone?'✓ '+fmtSW(saved):btnLabel}
      </button>
    </div>`;
  }
  return h;
}

function dayTotalSets(d){const {t,wk}=SCHED[d-1];if(t==='rest')return 0;const vi=wk<=2?0:wk===3?1:2;let n=0;WKT[t].forEach(ex=>{const v=ex.v[vi];if(v)n+=parseInt(v[0]);});return n;}
function daySavedSets(d){const log=getLog(d);let n=0;Object.values(log.sets||{}).forEach(arr=>{(arr||[]).forEach(x=>{if(x!=null)n++;});});return n;}
function allSetsDone(d){const tot=dayTotalSets(d);return tot>0&&daySavedSets(d)>=tot;}

function weightChartSVG(){
  const pts=[...data.wt].sort((a,b)=>a.d-b.d);
  if(pts.length<2)return '';
  const W=320,H=130,pad=26;
  const ws=pts.map(p=>p.w);const min=Math.min(...ws),max=Math.max(...ws),rng=(max-min)||1;
  const xy=pts.map((p,i)=>{const x=pad+(i/(pts.length-1))*(W-2*pad);const y=pad+(1-(p.w-min)/rng)*(H-2*pad);return [+x.toFixed(1),+y.toFixed(1)];});
  const poly=xy.map(p=>p.join(',')).join(' ');
  const area=`${pad},${H-pad} ${poly} ${(W-pad)},${H-pad}`;
  const dots=xy.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="var(--acc)"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <polygon points="${area}" fill="rgba(127,119,221,0.12)"/>
    <polyline points="${poly}" fill="none" stroke="var(--acc2)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${pad}" y="14" fill="var(--txt3)" font-size="10">${max} ק״ג</text>
    <text x="${pad}" y="${H-6}" fill="var(--txt3)" font-size="10">${min} ק״ג</text>
  </svg>`;
}

async function analyzePhoto(file){
  const apiKey=LS.get('claudeApiKey');
  if(!apiKey)return;
  const btn=document.getElementById('cam-btn');
  btn.textContent='🔍 מנתח את המנה...';btn.disabled=true;

  try{
    const base64=await new Promise((res,rej)=>{
      // Compress if large
      const img=new Image();
      const url=URL.createObjectURL(file);
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=800;
        let {width:w,height:h}=img;
        if(w>MAX||h>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        res(canvas.toDataURL('image/jpeg',0.85).split(',')[1]);
      };
      img.onerror=rej;img.src=url;
    });

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'content-type':'application/json',
        'anthropic-dangerous-direct-browser-calls':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:300,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
            {type:'text',text:'זהה את המנה בתמונה ותאמוד קלוריות ומאקרו. חשוב: ענה ב-JSON בלבד ללא שום טקסט נוסף לפני או אחרי: {"dish":"שם המנה בעברית","calories":0,"protein":0,"carbs":0,"fat":0}'}
          ]
        }]
      })
    });

    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||`שגיאת API: ${resp.status}`);}
    const result=await resp.json();
    const txt=result.content[0].text.trim();
    const match=txt.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('תשובה לא תקינה מ-API');
    const food=JSON.parse(match[0]);
    showFoodResult(food);
  }catch(e){
    alert('שגיאה בניתוח: '+e.message+'\n\nודא שמפתח ה-API תקין.');
  }

  btn.textContent='📷 צלם מנה → חישוב קלוריות אוטומטי';btn.disabled=false;
}

  const d=viewDay||getDay();

function renderProg(){
  const d=getDay();
  const done=SCHED.filter(({d:x})=>getLog(x).done).length;

  const accColors={upper:'rgba(175,169,236,0.2)',lower:'rgba(127,119,221,0.2)',core:'rgba(83,74,183,0.2)',rest:'rgba(100,100,100,0.15)'};
  const bdColors={upper:'rgba(175,169,236,0.45)',lower:'rgba(127,119,221,0.45)',core:'rgba(83,74,183,0.45)',rest:'rgba(100,100,100,0.3)'};

  let h=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
    <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">ימים הושלמו</div></div>

  <div class="pb"><div class="pbf" style="width:${pct}%"></div></div>`;

  // This-week summary
  const curWk=SCHED[d-1].wk;
  const wkDays=SCHED.filter(s=>s.wk===curWk);
  const wkDone=wkDays.filter(s=>getLog(s.d).done).length;
  let msg='קדימה, אתה בדרך! 💪';
  if(wkDone>=5)msg='שבוע מטורף — אלוף! 🏆';
  else if(wkDone>=3)msg='ממשיכים חזק, כל הכבוד! 🔥';
  else if(wkDone===0)msg='יום חדש, הזדמנות חדשה. בוא נתחיל 🙌';
  h+=`<div class="card" style="background:var(--acc-bg);border:0.5px solid var(--acc-bd);text-align:center;padding:14px">
    <div style="font-size:12px;color:var(--txt3);margin-bottom:3px">סיכום שבוע ${curWk}</div>
    <div style="font-size:15px;font-weight:500;margin-bottom:6px">${wkDone}/${wkDays.length} אימונים השבוע</div>
    <div style="font-size:13px;color:var(--acc)">${msg}</div>
  </div>`;

  h+=`<div class="sec">מפת ימים</div>
  <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-bottom:16px">`;

  SCHED.forEach(({d:x,t})=>{
    const dn=getLog(x).done;const isCur=x===d;
    h+=`<div class="hmc" style="background:${dn?'rgba(175,169,236,0.3)':accColors[t]};border:1px solid ${dn?'rgba(175,169,236,0.6)':bdColors[t]};${isCur?'outline:2px solid var(--acc);outline-offset:1px':''};color:${dn?'var(--acc)':'var(--txt3)'}">
      ${dn?'✓':x}

  });

  // Achievements
  h+=`<div class="sec">🏆 הישגים</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">`;

  h+='</div>';

  // Set time records
  let hasRecords=false;
  const rows=[];
  SCHED.forEach(({d:x,t})=>{
    if(t==='rest')return;
    const log=getLog(x);
    if(!log.sets||!Object.keys(log.sets).length)return;
    WKT[t].forEach((ex,i)=>{
      const key=`${x}_${i}`;
      const times=log.sets[key];
      if(!times||!times.length)return;
      const valid=times.filter(t2=>t2!==null&&t2!==undefined);
      if(!valid.length)return;
      hasRecords=true;
      rows.push({day:x,name:ex.n,times:valid});
    });
  });

  if(hasRecords){
    h+=`<div class="sec">⏱ זמני סטים</div><div class="card" style="padding:10px 14px">`;

        </div>
      </div>`;
    });
    h+='</div>';
  }

  if(data.wt.length){
    const chart=weightChartSVG();
    h+=`<div class="sec">⚖️ משקל</div><div class="card" style="padding:14px 15px">`;
    if(chart)h+=chart;
    const pts=[...data.wt].sort((a,b)=>a.d-b.d);
    const diff=+(pts[pts.length-1].w-pts[0].w).toFixed(1);
    if(pts.length>1)h+=`<div style="text-align:center;font-size:12px;color:var(--txt2);margin:${chart?'10px':'0'} 0 6px">שינוי כולל: <span style="color:${diff<0?'#5BD17F':diff>0?'#EF9F27':'var(--acc)'};font-weight:500">${diff>0?'+':''}${diff} ק״ג</span></div>`;
    h+=`<div style="margin-top:6px">`;
    pts.slice().reverse().forEach(({d:x,w})=>{
      h+=`<div style="display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:0.5px solid var(--bdr)"><span style="color:var(--txt2)">יום ${x}</span><span style="color:var(--acc);font-weight:500">${w} ק״ג</span></div>`;
    });
    h+='</div></div>';
  }

  // BMI
  const lastWt=data.wt.length?[...data.wt].sort((a,b)=>a.d-b.d).pop().w:null;
  h+=`<div class="sec">⚖️ BMI</div><div class="card" style="padding:14px 15px">`;
  if(!data.height){
    h+=`<div style="font-size:12px;color:var(--txt2);margin-bottom:8px">הזן את הגובה שלך (ס״מ) כדי לחשב BMI:</div>
      <div style="display:flex;gap:6px"><input type="number" id="hin" placeholder="לדוגמה 178" style="flex:1"><button onclick="saveHeight(document.getElementById('hin').value)" style="background:var(--acc2);border:none;color:#fff;padding:10px 16px">שמור</button></div>`;
  } else if(!lastWt){
    h+=`<div style="font-size:12px;color:var(--txt2)">גובה: ${data.height} ס״מ. הזן משקל בטאב האימון כדי לחשב BMI. <button onclick="data.height=null;save();renderProg()" style="font-size:11px;padding:3px 8px;border-radius:14px;margin-right:6px">שנה גובה</button></div>`;
  } else {
    const bmi=lastWt/Math.pow(data.height/100,2);
    const cat=bmi<18.5?['תת-משקל','#EF9F27']:bmi<25?['תקין','#5BD17F']:bmi<30?['עודף משקל','#EF9F27']:['השמנה','#E24B4A'];
    h+=`<div style="display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:30px;font-weight:700;color:${cat[1]}">${bmi.toFixed(1)}</div><div style="font-size:12px;color:${cat[1]}">${cat[0]}</div></div>
      <div style="text-align:left;font-size:11px;color:var(--txt3)">משקל ${lastWt} ק״ג · גובה ${data.height} ס״מ<br><button onclick="data.height=null;save();renderProg()" style="font-size:11px;padding:3px 8px;border-radius:14px;margin-top:6px">שנה גובה</button></div>
    </div>`;
  }
  h+='</div>';

  // Progress photos
  h+=`<div class="sec">📸 תמונות התקדמות</div>
  <div class="card">
    <div id="ph-wrap" style="margin-bottom:10px"></div>
    <button onclick="pickPhoto()" style="width:100%;padding:10px;border-radius:11px;font-size:13px;background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)">📸 הוסף תמונה</button>
  </div>`;

  document.getElementById('pg-prog').innerHTML=h;
  renderPhotos();
}

if('serviceWorker' in navigator){
  let _swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{if(_swReloaded)return;_swReloaded=true;location.reload();});
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(r=>r.update()).catch(()=>{});});
}
try{load();renderToday();}catch(e){document.getElementById('pg-today').innerHTML='<div style="padding:20px;color:#f77;font-family:monospace;font-size:13px;white-space:pre-wrap">שגיאה: '+e.message+'<br><br>'+e.stack+'</div>';}
</script>
</body>
</html>
