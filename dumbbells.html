<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>אימון משקולות 💪</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest-db.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="משקולות">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#FF945A;--bg2:#ffffff;--bg3:#FBEDE2;
  --txt:#2B190E;--txt2:#6B4632;--txt3:#8E5E42;
  --bdr:rgba(60,30,10,0.08);--bdr2:rgba(60,30,10,0.14);
  --acc:#D8521C;--acc2:#FF7A3D;--acc3:#B23E12;
  --acc-bg:rgba(255,122,61,0.12);--acc-bd:rgba(255,122,61,0.30);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#FF945A}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:transparent;color:var(--txt);direction:rtl;max-width:640px;margin:0 auto;padding:14px 14px 90px;font-size:15px;position:relative}
body::before{content:'';position:fixed;inset:-12%;z-index:-1;pointer-events:none;background:radial-gradient(58% 45% at 22% 15%,rgba(255,224,170,.85),transparent 60%),radial-gradient(55% 50% at 83% 73%,rgba(255,116,92,.82),transparent 60%),radial-gradient(50% 40% at 60% 48%,rgba(255,168,112,.6),transparent 65%),linear-gradient(165deg,#FFB770,#FF945A 55%,#FF7E64);animation:floaty 16s ease-in-out infinite alternate}
@keyframes floaty{0%{transform:translate(0,0)}50%{transform:translate(-2.2%,2.6%)}100%{transform:translate(2%,-1.6%)}}
button{cursor:pointer;font-family:inherit;font-size:14px;border-radius:10px;border:0.5px solid var(--bdr2);background:var(--bg2);color:var(--txt);padding:9px 16px;transition:opacity .15s}
button:active{opacity:.6}
input{font-family:inherit;font-size:14px;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:10px;padding:10px 13px;color:var(--txt);width:100%}
input:focus{outline:none;border-color:var(--acc-bd)}
input::placeholder{color:var(--txt3)}
.tab-bar{position:fixed;bottom:0;right:0;left:0;background:var(--bg2);border-top:0.5px solid var(--bdr2);display:flex;z-index:99;max-width:640px;margin:auto;padding-bottom:env(safe-area-inset-bottom,6px)}
.tb{flex:1;border:none;background:transparent;padding:10px 4px 8px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt3);border-radius:0}
.tb.on{color:var(--acc);font-weight:500}
.tbi{font-size:22px;line-height:1}
.ex-row{background:var(--bg2);border-radius:14px;margin-bottom:6px;overflow:hidden}
.ex-head{padding:13px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.ex-body{display:none;padding:0 15px 14px;border-top:0.5px solid var(--bdr)}
.ex-body.open{display:block}
.step{display:flex;gap:8px;margin-bottom:5px;font-size:13px;line-height:1.6;color:var(--txt2)}
.sn{color:var(--txt3);min-width:14px;font-size:11px;margin-top:2px}
.tip{background:var(--bg3);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--txt2);margin-top:8px}
.yt{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;border-radius:20px;background:rgba(200,30,30,0.08);border:0.5px solid rgba(200,30,30,0.3);text-decoration:none;color:var(--txt);white-space:nowrap;margin-top:10px}
.card{background:var(--bg2);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.sec{font-size:12px;font-weight:500;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin:16px 0 8px}
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:4px 11px;font-size:12px;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--txt2)}
.done-big{width:100%;padding:15px;font-size:15px;font-weight:500;border-radius:14px;margin:10px 0;background:var(--acc2);border:none;color:#fff}
.done-big.done{background:var(--acc-bg);border:0.5px solid var(--acc-bd);color:var(--acc)}
.food-chip{padding:7px 13px;border-radius:20px;font-size:13px;background:var(--bg2);border:0.5px solid var(--bdr2);color:var(--txt2)}
.food-item{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:var(--bg2);border-radius:10px;margin-bottom:4px;font-size:13px}
.rm{border:none;background:transparent;color:var(--txt3);font-size:14px;padding:2px 6px;cursor:pointer}
.stat{background:var(--bg2);border-radius:12px;padding:14px;text-align:center}
.stat-n{font-size:26px;font-weight:600;color:var(--acc)}
.stat-l{font-size:11px;color:var(--txt3);margin-top:2px}
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:6px 0 14px}
.pbf{height:100%;background:var(--acc2);border-radius:3px}
.hmc{height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--txt3)}
.set-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--bdr)}
.set-row:last-child{border-bottom:none}
#tw{display:none;position:fixed;bottom:70px;right:0;left:0;max-width:640px;margin:auto;padding:0 14px;z-index:98}
#tw-inner{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:18px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 16px rgba(60,30,10,0.12)}
#tw-num{font-size:44px;font-weight:700;letter-spacing:-2px;line-height:1;color:var(--acc)}
#tw-lbl{font-size:11px;color:var(--txt3);margin-bottom:3px}
#tw-sub{font-size:10px;color:var(--txt3);margin-top:2px}

/* Fullscreen timer overlay */
#tov{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,5,8,0.98);backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:24px}
#tov.on{display:flex}
#tov-ctx{font-size:15px;color:var(--acc);font-weight:500;letter-spacing:.3px;text-align:center}
#tov-ring{position:relative;width:min(74vw,300px);aspect-ratio:1}
#tov-ring svg{width:100%;height:100%}
#tov-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(52px,16vw,88px);font-weight:700;letter-spacing:-3px;color:#fff}
#tov-name{font-size:15px;color:var(--txt2);text-align:center;max-width:90%}
#tov-ctrls{display:flex;gap:14px;align-items:center}
#tov-ctrls button{width:64px;height:64px;border-radius:50%;font-size:16px;font-weight:600;background:var(--bg2);border:0.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center}
#tov-pause{font-size:24px!important}
#tov-done{padding:15px 36px;border-radius:24px;font-size:16px;font-weight:600;background:var(--acc2);border:none;color:#fff}
#tov-skip{padding:11px 26px;border-radius:24px;font-size:14px;font-weight:500;background:var(--bg2);border:0.5px solid var(--bdr2);color:var(--txt2)}
#tov-x{position:absolute;top:18px;left:18px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:16px}

/* Progress photo prompt */
#pp{display:none;position:fixed;inset:0;z-index:210;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:24px}
#pp.on{display:flex}
#pp-card{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:22px;padding:26px 22px;text-align:center;max-width:340px;width:100%}
#pp-emoji{font-size:46px;margin-bottom:6px}
#pp-title{font-size:18px;font-weight:600;margin-bottom:6px}
#pp-sub{font-size:13px;color:var(--txt2);margin-bottom:18px;line-height:1.5}
#pp-shot{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:500;background:var(--acc2);border:none;color:#fff;margin-bottom:8px}
#pp-later{width:100%;padding:11px;border-radius:14px;font-size:13px;color:var(--txt3);background:transparent;border:none}
#pp-thumb img,#pp-thumb video{width:100%;border-radius:14px;margin-top:12px}
#pp-vid{width:100%;padding:13px;border-radius:14px;font-size:15px;font-weight:500;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--txt);margin-bottom:8px}
.ph-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.7);pointer-events:none}
#mv{display:none;position:fixed;inset:0;z-index:220;background:rgba(0,0,0,0.92);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:18px}
#mv.on{display:flex}
#mv-close{position:absolute;top:16px;left:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:16px}
.acc{margin-bottom:8px}
.acc-h{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:14px;padding:15px 16px;font-size:15px;font-weight:500;color:var(--txt)}
.acc-arr{color:var(--txt3);font-size:18px}
.acc-b{padding:8px 2px 2px}
.start-btn{flex:1;min-width:140px;font-size:14px;padding:13px 16px;border-radius:14px;border:none;color:#fff;font-weight:600}

/* Water + notes + badges + photos */
.wbtn{width:42px;height:42px;border-radius:50%;font-size:20px;font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--acc)}
.note-chip{padding:7px 13px;border-radius:20px;font-size:13px;background:var(--bg2);border:0.5px solid var(--bdr2);color:var(--txt2)}
.note-chip.on{background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)}
.badge{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;background:var(--bg2);border:0.5px solid var(--bdr);text-align:center}
.badge.lk{opacity:.35;filter:grayscale(1)}
.badge-i{font-size:26px;line-height:1}
.badge-t{font-size:9px;color:var(--txt3);line-height:1.2}
.badge.un .badge-t{color:var(--acc)}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ph-cell{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg3)}
.ph-cell img{width:100%;height:100%;object-fit:cover}
.ph-day{position:absolute;bottom:0;right:0;left:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));color:#fff;font-size:9px;padding:8px 5px 3px;text-align:center}
.ph-del{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
.ph-star{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;color:#EFC04B;font-size:12px;display:flex;align-items:center;justify-content:center}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:215;overflow:hidden}
.cft{position:absolute;width:9px;height:14px;top:-20px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(104vh) rotate(720deg);opacity:.9}}
.dino-hero{position:relative;border-radius:16px;overflow:hidden;margin-bottom:14px;min-height:176px;background:#171018}
.dino-hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.dino-hero .fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.06),rgba(0,0,0,.32) 42%,rgba(0,0,0,.82) 80%,var(--bg))}
.dino-hero .inr{position:relative;padding:14px}
.dino-badge{display:inline-flex;align-items:baseline;gap:5px;margin-top:11px;background:rgba(0,0,0,.42);border-radius:20px;padding:5px 11px}
.dino-badge .nm{color:#fff;font-size:12.5px;font-weight:600}
.dino-badge .sub{color:rgba(255,255,255,.85);font-size:11px}
.dino-bar{height:5px;background:rgba(255,255,255,.28);border-radius:3px;overflow:hidden;margin-top:9px;max-width:230px}
.dino-bar>i{display:block;height:100%;background:linear-gradient(90deg,#FF8A66,#FFC371);border-radius:3px;transition:width .6s}
</style>
</head>
<body>

<div id="pg-today"></div>
<div id="pg-nutr" style="display:none"></div>
<div id="pg-metrics" style="display:none"></div>
<div id="pg-prog" style="display:none"></div>

<!-- Fullscreen timer -->
<div id="tov">
  <button id="tov-x" onclick="stopAll()">✕</button>
  <div id="tov-ctx"></div>
  <div id="tov-ring">
    <svg viewBox="0 0 220 220">
      <circle cx="110" cy="110" r="100" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="11"/>
      <circle id="tov-arc" cx="110" cy="110" r="100" fill="none" stroke="var(--acc2)" stroke-width="11" stroke-linecap="round" transform="rotate(-90 110 110)" stroke-dasharray="628" stroke-dashoffset="0"/>
    </svg>
    <div id="tov-num">0</div>
  </div>
  <div id="tov-name"></div>
  <div id="tov-ctrls">
    <button onclick="adjTimer(-15)">−15</button>
    <button id="tov-pause" onclick="pauseTimer()">⏸</button>
    <button onclick="adjTimer(15)">+15</button>
  </div>
  <button id="tov-done">✓ סיימתי את הסט</button>
  <button id="tov-skip" onclick="skipTimer()">דלג ←</button>
</div>

<!-- Progress photo prompt -->
<div id="pp">
  <div id="pp-card">
    <div id="pp-emoji">🎉</div>
    <div id="pp-title">כל הכבוד! סיימת את האימון</div>
    <div id="pp-sub">צלם תמונת התקדמות — ככה תראה את השינוי בגוף לאורך הזמן.</div>
    <button id="pp-shot" onclick="pickPhoto()">📸 צלם תמונה</button>
    <button id="pp-vid" onclick="pickVideo()">🎥 צלם סרטון</button>
    <button id="pp-later" onclick="closePP()">אחר כך</button>
    <div id="pp-thumb"></div>
  </div>
</div>
<input type="file" accept="image/*" capture="user" id="photo-input" style="display:none" onchange="handlePhotoPick(this)">
<input type="file" accept="video/*" capture="user" id="video-input" style="display:none" onchange="handleVideoPick(this)">
<div id="mv" onclick="if(event.target.id==='mv'||event.target.id==='mv-close')closeMV()">
  <button id="mv-close" onclick="closeMV()">✕</button>
  <div id="mv-content"></div>
</div>
<div id="confetti"></div>

<div class="tab-bar">
  <button class="tb on" id="btn-today" onclick="gotoTab('today')"><span class="tbi">🏋️</span>האימון</button>
  <button class="tb" id="btn-nutr" onclick="gotoTab('nutr')"><span class="tbi">🍎</span>תזונה</button>
  <button class="tb" id="btn-metrics" onclick="gotoTab('metrics')"><span class="tbi">📈</span>מדדים</button>
  <button class="tb" id="btn-prog" onclick="gotoTab('prog')"><span class="tbi">📊</span>התקדמות</button>
  <button class="tb" id="btn-gallery" onclick="location.href='gallery.html'"><span class="tbi">🔍</span>גלריה</button>
</div>

<script>
const SCHED=[
  {d:1,t:'upper',wk:1},{d:2,t:'lower',wk:1},{d:3,t:'core',wk:1},{d:4,t:'rest',wk:1},
  {d:5,t:'upper',wk:1},{d:6,t:'lower',wk:1},{d:7,t:'core',wk:1},
  {d:8,t:'rest',wk:2},{d:9,t:'upper',wk:2},{d:10,t:'lower',wk:2},{d:11,t:'core',wk:2},
  {d:12,t:'rest',wk:2},{d:13,t:'upper',wk:2},{d:14,t:'lower',wk:2},
  {d:15,t:'core',wk:3},{d:16,t:'rest',wk:3},{d:17,t:'upper',wk:3},{d:18,t:'lower',wk:3},
  {d:19,t:'core',wk:3},{d:20,t:'rest',wk:3},{d:21,t:'upper',wk:3},
  {d:22,t:'lower',wk:4},{d:23,t:'core',wk:4},{d:24,t:'rest',wk:4},{d:25,t:'upper',wk:4},
  {d:26,t:'lower',wk:4},{d:27,t:'core',wk:4},{d:28,t:'rest',wk:4},
  {d:29,t:'upper',wk:4},{d:30,t:'lower',wk:4}
];
const TNAMES={upper:'גוף עליון',lower:'גוף תחתון',core:'ליבה',rest:'מנוחה אקטיבית'};
const TEMOJI={upper:'💪',lower:'🦵',core:'⚡',rest:'🧘'};
const WARMUP=[{n:'קפיצות במקום',t:30},{n:'מעגולי ידיים',t:20},{n:'מעגולי ירכיים',t:20},{n:'Cat-cow',t:30},{n:'Leg swings',t:20}];
const FOODS=['ביצים','קוטג׳','לחם','אורז','עוף','שיבולת שועל','בננה','טונה','גבינה','פסטה'];
const NOTES=['💪 מלא אנרגיה','🔥 אימון מעולה','✅ הגב הרגיש טוב','😮‍💨 היה קשה','📈 התחזקתי','😴 הייתי עייף','⚠️ כאב גב','🏋️ העליתי משקל'];

// v: ['סטים×חזרות', 'משקל', מנוחה_שניות]  ×3 (שב׳1-2 / שב׳3 / שב׳4)
// timed:true → סט על זמן (פלאנק וכד')
const WKT={
  upper:[
    {n:'Dumbbell floor press',m:'חזה · טריצפס',gif:'gifs/db-floor-press.gif',
     v:[['3×8','5 קג',45],['3×10','5 קג',45],['4×10','5 קג',50]],
     steps:['שכב, משקולת בכל יד בגובה החזה, מרפקים ב-45°',
            'גוף שטוח — עורף, גב, ישבן ורגליים על הרצפה',
            'דחוף למעלה עד שמרפקים כמעט ישרים',
            'תרד לאט — 3 שניות לכיוון מטה'],
     tip:'על הרצפה = טווח מוגבל = בטוח יותר לכתפיים',
     yt:'https://www.youtube.com/results?search_query=dumbbell+floor+press+beginner'},
    {n:'Bent-over row',m:'גב · ביצפס',gif:'gifs/db-bent-row.gif',
     v:[['3×8','5 קג',45],['3×10','5 קג',45],['4×10','5 קג',50]],
     steps:['כופף קדימה 45°, גב ישר, ברכיים מעט כפופות',
            'משקולות תלויות לפניך, ידיים ישרות',
            'משוך לכיוון הבטן — מרפקים אחורה ולמעלה',
            'הדק שרירי הגב, תרד לאט'],
     tip:'גב ישר תמיד — לא מתכופף ולא מקמר',
     yt:'https://www.youtube.com/results?search_query=dumbbell+bent+over+row+proper+form'},
    {n:'Shoulder press',m:'כתפיים · טריצפס',gif:'gifs/db-shoulder-press.gif',
     v:[['3×8','5 קג',45],['3×10','5 קג',45],['4×10','5 קג',50]],
     steps:['שב על כיסא, גב ישר ונשען',
            'משקולות בגובה האוזניים, מרפקים ב-90°',
            'דחוף ישר למעלה — לא "V" לצדדים',
            'תרד לאט לגובה הסנטר'],
     tip:'ישיבה = יציבות = פחות לחץ על הגב',
     yt:'https://www.youtube.com/results?search_query=seated+dumbbell+shoulder+press+beginner'},
    {n:'Bicep curl',m:'ביצפס',gif:'gifs/db-bicep-curl.gif',
     v:[['3×8','5 קג',40],['3×10','5 קג',40],['3×12','5 קג',40]],
     steps:['עמוד, ידיים לצדדים, כפות ידיים פונות קדימה',
            'כופף מרפק — הרם משקולת לכיוון הכתף',
            'הידק ביצפס בחוזקה למעלה',
            'תרד לאט — 3 שניות'],
     tip:'אל תנדנד את הגוף — הביצפס עושה הכל',

// ── Timer ─────────────────────────────────────────────
function parseSec(s){const m=(s||'').match(/\d+/);return m?+m[0]:0;}
function fmtSW(s){const m=Math.floor(s/60),ss=s%60;return`${m}:${ss.toString().padStart(2,'0')}`;}
function beep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.18,0.36].forEach(t=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0,ac.currentTime+t);
      g.gain.linearRampToValueAtTime(0.35,ac.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.28);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.35);
    });
  }catch(e){}
}

let T={mode:null,id:null,sec:0,total:0,cb:null,key:null,idx:null,paused:false};
// _exMap: populated during render — holds exercise metadata per key
const _exMap={};
const _ARC=628; // 2·π·100
function _tov(id){return document.getElementById(id);}
function cancelTimer(){if(T.id){clearInterval(T.id);T.id=null;}T.mode=null;T.cb=null;T.paused=false;_tov('tov').classList.remove('on');}
function _renderCD(){
  const el=_tov('tov-num');el.textContent=T.sec;
  el.style.color=T.sec<=5?'#E24B4A':T.sec<=10?'#EF9F27':'#fff';
  const arc=_tov('tov-arc');const frac=T.total>0?T.sec/T.total:0;
  arc.style.strokeDashoffset=(_ARC*(1-frac)).toFixed(1);
  arc.style.stroke=T.sec<=5?'#E24B4A':T.sec<=10?'#EF9F27':'var(--acc2)';
}
// Countdown (rest between sets, or timed hold)
function startCD(sec,lbl,onDone,name){
  if(T.id)clearInterval(T.id);
  T={mode:'cd',id:null,sec,total:sec,cb:onDone||null,paused:false};
  _tov('tov-ctx').textContent=lbl||'מנוחה 💤';
  _tov('tov-name').textContent=name||'';
  _tov('tov-pause').textContent='⏸';
  _tov('tov-ctrls').style.display='flex';
  _tov('tov-skip').style.display='block';
  _tov('tov-done').style.display='none';
  _tov('tov').classList.add('on');
  _renderCD();
  T.id=setInterval(()=>{
    if(T.paused)return;
    T.sec--;
    if(T.sec<=0){T.sec=0;_renderCD();const fn=T.cb;T.cb=null;clearInterval(T.id);T.id=null;_tov('tov').classList.remove('on');beep();if(fn)fn();}
    else _renderCD();
  },1000);
}
function pauseTimer(){if(T.mode!=='cd')return;T.paused=!T.paused;_tov('tov-pause').textContent=T.paused?'▶':'⏸';}
function adjTimer(n){if(T.mode!=='cd')return;T.sec=Math.max(1,T.sec+n);if(T.sec>T.total)T.total=T.sec;_renderCD();}
function skipTimer(){const fn=T.cb;T.cb=null;if(T.id){clearInterval(T.id);T.id=null;}T.paused=false;_tov('tov').classList.remove('on');if(fn)fn();}
// Stopwatch (count up) for a regular dumbbell set
function startSW(key,idx){
  const m=_exMap[key];if(!m)return;
  if(T.id)clearInterval(T.id);
  T={mode:'sw',id:null,sec:0,key,idx};
  _tov('tov-ctx').textContent=`סט ${idx+1} · ${m.n}`;
  _tov('tov-name').textContent='ספירת זמן הסט · לחץ "סיימתי" בסיום';
  _tov('tov-ctrls').style.display='none';
  _tov('tov-skip').style.display='none';
  _tov('tov-done').style.display='block';
  _tov('tov-done').onclick=finishSW;
  const arc=_tov('tov-arc');arc.style.strokeDashoffset=0;arc.style.stroke='var(--acc2)';
  _tov('tov-num').textContent=fmtSW(0);_tov('tov-num').style.color='#fff';
  _tov('tov').classList.add('on');
  T.id=setInterval(()=>{T.sec++;_tov('tov-num').textContent=fmtSW(T.sec);},1000);
}
function finishSW(){
  const elapsed=T.sec,key=T.key,idx=T.idx;
  if(T.id){clearInterval(T.id);T.id=null;}
  beep();_afterSet(key,idx,elapsed);
}
// Timed hold set (e.g. plank)
function startTimedSet(key,idx){
  const m=_exMap[key];if(!m)return;
  startCD(m.setDur,`סט ${idx+1} · החזקה 🧘`,()=>{_afterSet(key,idx,m.setDur);},m.n);
}
// Shared: after a set finishes — guided auto-advances, manual just rests
function _afterSet(key,idx,elapsed){
  saveSetTime(key,idx,elapsed);markSetDone(key,idx,fmtSW(elapsed));
  const d=viewDay||getDay();const m=_exMap[key];
  if(GSEQ&&GSEQ.on){
    if(GSEQ.i>=GSEQ.steps.length-1){GSEQ.on=false;_tov('tov').classList.remove('on');finishWorkout(d);return;}
    startCD(m?m.rest:45,'מנוחה 💤 · הסט הבא מתחיל אוטומטית',()=>{GSEQ.i++;gRun();},m?m.n:'');
  } else {
    if(allSetsDone(d)){_tov('tov').classList.remove('on');finishWorkout(d);return;}
    if(m&&m.rest)startCD(m.rest,'מנוחה 💤',null,m.n);
  }
}
// ── Auto sequences: warmup / guided workout / stretches ─
let GSEQ=null, WSEQ=null;
function stopAll(){if(GSEQ)GSEQ.on=false;if(WSEQ)WSEQ.on=false;cancelTimer();}
function startGuided(){
  const d=viewDay||getDay();const {t,wk}=SCHED[d-1];if(t==='rest')return;
  const vi=wk<=2?0:wk===3?1:2;const steps=[];
  WKT[t].forEach((ex,ei)=>{const v=ex.v[vi];if(!v)return;const key=`${d}_${ei}`;const setsN=parseInt(v[0]);const rp=(v[0].split('×')[1]||'');const isTimed=/ש/.test(rp);_exMap[key]={n:ex.n,rest:v[2],timed:isTimed,setDur:isTimed?parseSec(rp):0};for(let s=0;s<setsN;s++)steps.push({key,idx:s,isTimed});});
  if(!steps.length)return;
  GSEQ={steps,i:0,on:true};gRun();
}
function gRun(){if(!GSEQ||!GSEQ.on)return;const st=GSEQ.steps[GSEQ.i];if(st.isTimed)startTimedSet(st.key,st.idx);else startSW(st.key,st.idx);}
function startWarmup(){WSEQ={i:0,on:true};wRun();}
function wRun(){if(!WSEQ||!WSEQ.on)return;if(WSEQ.i>=WARMUP.length){WSEQ.on=false;_tov('tov').classList.remove('on');beep();return;}const w=WARMUP[WSEQ.i];startCD(w.t,`חימום ${WSEQ.i+1}/${WARMUP.length} 🔥`,()=>{WSEQ.i++;wRun();},w.n);}
function startStretches(){const arr=WKT.rest;let i=0;const run=()=>{if(i>=arr.length){_tov('tov').classList.remove('on');beep();return;}const r=arr[i];startCD(parseSec(r.t),`מתיחה ${i+1}/${arr.length} 🧘`,()=>{i++;run();},r.n);};run();}

function markSetDone(key,idx,label){
  const btn=document.getElementById(`sb-${key}-${idx}`);
  if(!btn)return;
  btn.textContent='✓ '+label;
  btn.style.cssText='color:var(--acc);font-size:11px;padding:5px 10px;border-radius:20px;border:0.5px solid rgba(255,184,115,0.3);background:rgba(255,184,115,0.08);cursor:default';
  btn.onclick=null;
}

// ── Data ──────────────────────────────────────────────
let data={startDate:null,logs:{},wt:[]};
// Safe storage — falls back to in-memory if localStorage is blocked (e.g. data: URLs)
const LS=(()=>{
  let mem={},ok=true;
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');}catch(e){ok=false;}
  return{
    get:k=>{try{return ok?localStorage.getItem(k):(k in mem?mem[k]:null);}catch(e){return k in mem?mem[k]:null;}},
    set:(k,v)=>{try{ok?localStorage.setItem(k,v):(mem[k]=v);}catch(e){mem[k]=v;}}
  };
})();
function load(){try{const s=LS.get('myfit-db');if(s)data=JSON.parse(s);}catch(e){}}
function save(){try{LS.set('myfit-db',JSON.stringify(data));}catch(e){}}
function getDay(){
  if(!data.startDate){data.startDate=new Date().toISOString().split('T')[0];save();}
  const diff=Math.floor((Date.now()-new Date(data.startDate))/86400000)+1;
  return Math.min(30,Math.max(1,diff));
}
function getLog(d){
  if(!data.logs[d])data.logs[d]={done:false,food:[],sets:{},cals:0};
  if(!data.logs[d].sets)data.logs[d].sets={};
  return data.logs[d];
}
function getStreak(){let s=0;const d=getDay();for(let i=d;i>=1;i--){if(getLog(i).done)s++;else break;}return s;}
function saveSetTime(key,idx,t){
  const d=viewDay||getDay();const log=getLog(d);
  if(!log.sets[key])log.sets[key]=[];
  log.sets[key][idx]=t;save();
}
function getSetTime(key,idx){
  const d=viewDay||getDay();const log=getLog(d);
  if(!log.sets[key])return null;
  const v=log.sets[key][idx];return v===undefined?null:v;
}
function saveWt(v){const d=viewDay||getDay();data.wt=data.wt.filter(x=>x.d!==d);if(v){data.wt.push({d,w:parseFloat(v)});getLog(d).wt=parseFloat(v);}save();}
function saveSteps(v){const d=viewDay||getDay();getLog(d).steps=v?+v:null;save();}
function saveSleep(v){const d=viewDay||getDay();getLog(d).sleep=v?+v:null;save();}

function downloadWaterCalendar() {
  const hours = [8, 10, 12, 14, 16, 18, 20];
  let ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//MyFit//Water Reminders//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH'
  ];
  
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  
  hours.forEach((h, idx) => {
    const startStr = `${y}${m}${d}T${String(h).padStart(2, '0')}0000`;
    const endStr = `${y}${m}${d}T${String(h).padStart(2, '0')}1500`;
    const stamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
    
    ics.push('BEGIN:VEVENT');
    ics.push(`UID:water-reminder-${h}-${idx}@myfit`);
    ics.push(`DTSTAMP:${stamp}`);
    ics.push(`DTSTART;TZID=Asia/Jerusalem:${startStr}`);
    ics.push(`DTEND;TZID=Asia/Jerusalem:${endStr}`);
    ics.push('RRULE:FREQ=DAILY');
    ics.push('SUMMARY:💧 זמן לשתות מים!');
    ics.push('DESCRIPTION:תזכורת יומית מאפליקציית הכושר שלי לשמור על רוויה.');
    ics.push('BEGIN:VALARM');
    ics.push('ACTION:DISPLAY');
    ics.push('DESCRIPTION:💧 זמן לשתות מים!');
    ics.push('TRIGGER:-PT0M');
    ics.push('END:VALARM');
    ics.push('END:VEVENT');
  });
  
  ics.push('END:VCALENDAR');
  
  const blob = new Blob([ics.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'water-reminders.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Progress photos (IndexedDB) ───────────────────────
function _openDB(){return new Promise((res,rej)=>{try{const r=indexedDB.open('karbyfit-db',1);r.onupgradeneeded=()=>r.result.createObjectStore('photos',{keyPath:'id',autoIncrement:true});r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}catch(e){rej(e);}});}
async function addMedia(kind,payload){try{const db=await _openDB();await new Promise((res,rej)=>{const tx=db.transaction('photos','readwrite');tx.objectStore('photos').add({ts:Date.now(),day:viewDay||getDay(),kind,data:payload});tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});return true;}catch(e){return false;}}
async function getPhotos(){try{const db=await _openDB();const arr=await new Promise(res=>{const tx=db.transaction('photos','readonly');const q=tx.objectStore('photos').getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([]);});return arr.map(r=>{const val=r.data!=null?r.data:r.img;return {id:r.id,ts:r.ts,day:r.day,kind:r.kind||'photo',data:val,img:val};});}catch(e){return [];}}
async function delPhoto(id){if(!confirm('למחוק את הפריט?'))return;try{const db=await _openDB();await new Promise(res=>{const tx=db.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=res;tx.onerror=res;});}catch(e){}renderPhotos();}
function compressImg(file,max){return new Promise((res,rej)=>{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const cv=document.createElement('canvas');let{width:w,height:hh}=img;if(w>max||hh>max){const s=max/Math.max(w,hh);w=Math.round(w*s);hh=Math.round(hh*s);}cv.width=w;cv.height=hh;cv.getContext('2d').drawImage(img,0,0,w,hh);URL.revokeObjectURL(url);res(cv.toDataURL('image/jpeg',0.8));};img.onerror=rej;img.src=url;});}
function readDataURL(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(file);});}

const MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
async function renderYearCalendar(){
  const el=document.getElementById('yc-wrap');if(!el)return;
  const photos=await getPhotos();
  const year=new Date().getFullYear(),nowM=new Date().getMonth();

  Object.values(data.logs).forEach(l=>{if(!l.done||!l.doneAt)return;const dt=new Date(l.doneAt);if(dt.getFullYear()===year)cnt[dt.getMonth()]=(cnt[dt.getMonth()]||0)+1;});

    const key=year+'-'+m;

    </div>`;

// ── Weight chart ──────────────────────────────────────
function weightChartSVG(){
  const pts=[...data.wt].sort((a,b)=>a.d-b.d);
  if(pts.length<2)return '';
  const W=320,H=130,pad=26;
  const ws=pts.map(p=>p.w);const min=Math.min(...ws),max=Math.max(...ws),rng=(max-min)||1;
  const xy=pts.map((p,i)=>{const x=pad+(i/(pts.length-1))*(W-2*pad);const y=pad+(1-(p.w-min)/rng)*(H-2*pad);return [+x.toFixed(1),+y.toFixed(1)];});
  const poly=xy.map(p=>p.join(',')).join(' ');
  const area=`${pad},${H-pad} ${poly} ${(W-pad)},${H-pad}`;
  const dots=xy.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="var(--acc)"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <polygon points="${area}" fill="rgba(255,122,61,0.12)"/>
    <polyline points="${poly}" fill="none" stroke="var(--acc2)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${pad}" y="14" fill="var(--txt3)" font-size="10">${max} ק״ג</text>
    <text x="${pad}" y="${H-6}" fill="var(--txt3)" font-size="10">${min} ק״ג</text>
  </svg>`;
}

function triggerCamera(){
  const hasKey=!!LS.get('claudeApiKey');
  if(!hasKey){
    document.getElementById('api-section').style.display='block';
    document.getElementById('api-section').scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  document.getElementById('cam-input').click();
}

function handlePhoto(input){
  if(!input.files||!input.files[0])return;
  analyzePhoto(input.files[0]);
  input.value='';
}

async function analyzePhoto(file){
  const apiKey=LS.get('claudeApiKey');
  if(!apiKey)return;
  const btn=document.getElementById('cam-btn');
  btn.textContent='🔍 מנתח את המנה...';btn.disabled=true;

  try{
    const base64=await new Promise((res,rej)=>{
      // Compress if large
      const img=new Image();
      const url=URL.createObjectURL(file);
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=800;
        let {width:w,height:h}=img;
        if(w>MAX||h>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        res(canvas.toDataURL('image/jpeg',0.85).split(',')[1]);
      };
      img.onerror=rej;img.src=url;
    });

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'content-type':'application/json',
        'anthropic-dangerous-direct-browser-calls':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:300,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
            {type:'text',text:'זהה את המנה בתמונה ותאמוד קלוריות ומאקרו. חשוב: ענה ב-JSON בלבד ללא שום טקסט נוסף לפני או אחרי: {"dish":"שם המנה בעברית","calories":0,"protein":0,"carbs":0,"fat":0}'}
          ]
        }]
      })
    });

    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||`שגיאת API: ${resp.status}`);}
    const result=await resp.json();
    const txt=result.content[0].text.trim();
    const match=txt.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('תשובה לא תקינה מ-API');
    const food=JSON.parse(match[0]);
    showFoodResult(food);
  }catch(e){
    alert('שגיאה בניתוח: '+e.message+'\n\nודא שמפתח ה-API תקין.');
  }

  btn.textContent='📷 צלם מנה → חישוב קלוריות אוטומטי';btn.disabled=false;
}

function showFoodResult(food){
  const d=viewDay||getDay();
  const label=`${food.dish} (~${food.calories} קל׳)`;
  addFood(d,label);
  const el=document.getElementById('food-result');
  if(!el)return;
  el.style.display='block';
  el.innerHTML=`<div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:8px">
    <div style="font-size:14px;font-weight:500;margin-bottom:8px">📸 ${food.dish}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center">
      <div><div style="font-size:20px;font-weight:700;color:var(--acc)">${food.calories}</div><div style="font-size:10px;color:var(--txt3)">קל׳</div></div>
      <div><div style="font-size:20px;font-weight:700;color:var(--acc)">${food.protein}ג׳</div><div style="font-size:10px;color:var(--txt3)">חלבון</div></div>
      <div><div style="font-size:20px;font-weight:700;color:var(--acc)">${food.carbs}ג׳</div><div style="font-size:10px;color:var(--txt3)">פחמימות</div></div>
      <div><div style="font-size:20px;font-weight:700;color:var(--acc)">${food.fat}ג׳</div><div style="font-size:10px;color:var(--txt3)">שומן</div></div>
    </div>
  </div>`;
}

function saveApiKey(){
  const val=(document.getElementById('api-key-input')||{}).value||'';
  if(!val.trim())return;
  LS.set('claudeApiKey',val.trim());
  document.getElementById('api-section').style.display='none';
  const btn=document.getElementById('cam-btn');
  if(btn){btn.style.background='rgba(255,184,115,0.15)';
    setTimeout(()=>{btn.style.background='';},1000);}
}

function addFood(d,f){getLog(d).food.push(f);save();renderFL(d);}
function addFoodCustom(d){const inp=document.getElementById('fi');if(!inp||!inp.value.trim())return;addFood(d,inp.value.trim());inp.value='';}
function rmFood(d,i){getLog(d).food.splice(i,1);save();renderFL(d);}
function renderFL(d){
  const el=document.getElementById('fl');if(!el)return;
  const food=getLog(d).food;
  if(!food.length){el.innerHTML=`<div style="font-size:12px;color:var(--txt3)">עוד לא רשמת אוכל</div>`;return;}
  el.innerHTML=food.map((f,i)=>`<div class="food-item"><span style="color:var(--txt2)">· ${f}</span><button onclick="rmFood(${d},${i})" class="rm">✕</button></div>`).join('');
}

// ── Progress ──────────────────────────────────────────
function monthCalHTML(){
  const now=new Date();const year=now.getFullYear(),mo=now.getMonth(),todayD=now.getDate();
  const startDow=new Date(year,mo,1).getDay();
  const daysInMonth=new Date(year,mo+1,0).getDate();
  const trained={};Object.values(data.logs).forEach(l=>{if(l.done&&l.doneAt){const dt=new Date(l.doneAt);if(dt.getFullYear()===year&&dt.getMonth()===mo)trained[dt.getDate()]=true;}});
  let h=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;
  ['א','ב','ג','ד','ה','ו','ש'].forEach(x=>h+=`<div style="text-align:center;font-size:10px;color:var(--txt3);padding-bottom:2px">${x}</div>`);
  for(let i=0;i<startDow;i++)h+=`<div></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const tr=trained[day],isToday=day===todayD;
    h+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:12px;background:${tr?'var(--acc2)':'var(--bg3)'};color:${tr?'#fff':'var(--txt3)'};${isToday?'outline:2px solid var(--acc);outline-offset:-1px':''}">${tr?'✓':day}</div>`;
  }
  return h+'</div>';
}

// ── Dino pet: 10 stages by THIS month's workouts (resets monthly) ──
const DINO_T=[0,1,2,3,5,8,11,14,18,22]; // min workouts for stage 1..10
const DINO_NM=['הביצה ישנה 🥚','הביצה נסדקה!','מציץ החוצה 👀','בקע! 🐣','תינוק דינו','דינו צעיר','דינו נער','דינו בוגר 💪','טיטאן! 🦖','אלוף! 👑'];
function dinoMonth(){const y=new Date().getFullYear(),m=new Date().getMonth();let n=0;Object.values(data.logs).forEach(l=>{if(l.done&&l.doneAt){const dt=new Date(l.doneAt);if(dt.getFullYear()===y&&dt.getMonth()===m)n++;}});return n;}
function dinoStage(n){let s=0;for(let i=0;i<DINO_T.length;i++)if(n>=DINO_T[i])s=i;return s;} // 0..9
function dinoData(){
  const n=dinoMonth(),s=dinoStage(n),file=String(s+1).padStart(2,'0');
  const next=s<9?DINO_T[s+1]:null,left=next!==null?next-n:0;
  const sub=next!==null?`עוד ${left} ${left===1?'אימון':'אימונים'} והוא יתפתח →`:'הגעת לשיא! 🏆';
  const lo=DINO_T[s],hi=next!==null?next:lo+1;
  const pct=next!==null?Math.round((n-lo)/(hi-lo)*100):100;
  return {file,name:DINO_NM[s],sub,pct,n};
}

function renderProg(){
  const d=getDay();
  const done=SCHED.filter(({d:x})=>getLog(x).done).length;
  const streak=getStreak();const pct=Math.round(done/30*100);

  let h=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
    <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">ימים הושלמו</div></div>
    <div class="stat"><div class="stat-n">${streak}🔥</div><div class="stat-l">רצופים</div></div>
    <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">מהתוכנית</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-bottom:4px"><span>התקדמות כללית</span><span>${done}/30</span></div>
  <div class="pb"><div class="pbf" style="width:${pct}%"></div></div>`;

  // This-week summary
  const curWk=SCHED[d-1].wk;
  const wkDays=SCHED.filter(s=>s.wk===curWk);
  const wkDone=wkDays.filter(s=>getLog(s.d).done).length;
  let msg='קדימה, אתה בדרך! 💪';
  if(wkDone>=5)msg='שבוע מטורף — אלוף! 🏆';
  else if(wkDone>=3)msg='ממשיכים חזק, כל הכבוד! 🔥';
  else if(wkDone===0)msg='יום חדש, הזדמנות חדשה. בוא נתחיל 🙌';
  h+=`<div class="card" style="background:var(--acc-bg);border:0.5px solid var(--acc-bd);text-align:center;padding:14px">
    <div style="font-size:12px;color:var(--txt3);margin-bottom:3px">סיכום שבוע ${curWk}</div>
    <div style="font-size:15px;font-weight:500;margin-bottom:6px">${wkDone}/${wkDays.length} אימונים השבוע</div>
    <div style="font-size:13px;color:var(--acc)">${msg}</div>
  </div>`;

  // Real monthly calendar
  h+=`<div class="sec">📅 ${MONTHS[new Date().getMonth()]} ${new Date().getFullYear()}</div><div class="card">${monthCalHTML()}</div>`;

  // Achievements (collapsible)
  let abody=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">`;
  getAchievements().forEach(a=>{abody+=`<div class="badge ${a.un?'un':'lk'}"><div class="badge-i">${a.i}</div><div class="badge-t">${a.t}</div></div>`;});
  abody+='</div>';
  h+=acc('p-ach','🏆 הישגים',abody,false);

  // Live comparison
  h+=`<div class="sec">🤝 השוואה מול ${FB_NAMES[FB.other]}</div><div class="card" id="cmp-wrap"></div>`;

  // Set time records
  let hasRecords=false;
  const rows=[];
  SCHED.forEach(({d:x,t})=>{
    if(t==='rest')return;
    const log=getLog(x);
    if(!log.sets||!Object.keys(log.sets).length)return;
    WKT[t].forEach((ex,i)=>{
      const key=`${x}_${i}`;
      const times=log.sets[key];
      if(!times||!times.length)return;
      const valid=times.filter(t2=>t2!==null&&t2!==undefined);
      if(!valid.length)return;
      hasRecords=true;
      rows.push({day:x,name:ex.n,times:valid});
    });
  });

  if(hasRecords){
    h+=`<div class="sec">⏱ זמני סטים</div><div class="card" style="padding:10px 14px">`;
    rows.slice(-10).forEach(r=>{
      h+=`<div style="padding:7px 0;border-bottom:0.5px solid var(--bdr)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;color:var(--txt2)">יום ${r.day} · ${r.name}</span>
        </div>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
          ${r.times.map((t2,i)=>`<span style="font-size:11px;color:var(--acc);background:var(--acc-bg);border:0.5px solid var(--acc-bd);border-radius:20px;padding:2px 8px">סט ${i+1}: ${fmtSW(t2)}</span>`).join('')}
        </div>
      </div>`;
    });
    h+='</div>';
  }

  // Progress photos + videos (hidden behind a tap for privacy)
  const mediaBody=`<div class="card" style="margin-bottom:0">
    <div id="ph-wrap" style="margin-bottom:10px"></div>
    <div style="display:flex;gap:7px">
      <button onclick="pickPhoto()" style="flex:1;padding:10px;border-radius:11px;font-size:13px;background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)">📸 תמונה</button>
      <button onclick="pickVideo()" style="flex:1;padding:10px;border-radius:11px;font-size:13px;background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)">🎥 סרטון</button>
    </div>
    <div style="font-size:10px;color:var(--txt3);margin-top:7px;text-align:center">★ על תמונה = הופך אותה לתמונת החודש ביומן</div>
  </div>`;
  h+=acc('p-media','📸🎥 תמונות וסרטונים · מוסתר 🔒',mediaBody,false);

  // Yearly calendar
  h+=`<div class="sec">📅 יומן שנתי ${new Date().getFullYear()}</div>
  <div class="card" id="yc-wrap"></div>`;

  document.getElementById('pg-prog').innerHTML=h;
  renderPhotos();
  renderYearCalendar();
  renderCompare();
}
