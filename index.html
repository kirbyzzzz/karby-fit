<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>הכושר שלי</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="כושר">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#FF945A;--bg2:#ffffff;--bg3:#FBEDE2;
  --txt:#2B190E;--txt2:#6B4632;--txt3:#8E5E42;
  --bdr:rgba(60,30,10,0.08);--bdr2:rgba(60,30,10,0.14);
  --acc:#D8521C;--acc2:#FF7A3D;--acc3:#B23E12;
  --acc-bg:rgba(255,122,61,0.12);--acc-bd:rgba(255,122,61,0.30);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#FF945A}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:transparent;color:var(--txt);direction:rtl;max-width:640px;margin:0 auto;padding:14px 14px 90px;font-size:15px;position:relative}
body::before{content:'';position:fixed;inset:-12%;z-index:-1;pointer-events:none;background:radial-gradient(58% 45% at 22% 15%,rgba(255,224,170,.85),transparent 60%),radial-gradient(55% 50% at 83% 73%,rgba(255,116,92,.82),transparent 60%),radial-gradient(50% 40% at 60% 48%,rgba(255,168,112,.6),transparent 65%),linear-gradient(165deg,#FFB770,#FF945A 55%,#FF7E64);animation:floaty 16s ease-in-out infinite alternate}
@keyframes floaty{0%{transform:translate(0,0)}50%{transform:translate(-2.2%,2.6%)}100%{transform:translate(2%,-1.6%)}}
button{cursor:pointer;font-family:inherit;font-size:14px;border-radius:10px;border:0.5px solid var(--bdr2);background:var(--bg2);color:var(--txt);padding:9px 16px;transition:opacity .15s}
button:active{opacity:.6}
input{font-family:inherit;font-size:14px;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:10px;padding:10px 13px;color:var(--txt);width:100%}
input:focus{outline:none;border-color:var(--acc-bd)}
input::placeholder{color:var(--txt3)}
.tab-bar{position:fixed;bottom:0;right:0;left:0;background:var(--bg2);border-top:0.5px solid var(--bdr2);display:flex;z-index:99;max-width:640px;margin:auto;padding-bottom:env(safe-area-inset-bottom,6px)}
.tb{flex:1;border:none;background:transparent;padding:10px 4px 8px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt3);border-radius:0}
.tb.on{color:var(--acc);font-weight:500}
.tbi{font-size:22px;line-height:1}

/* Exercise cards */
.ex-row{background:var(--bg2);border-radius:14px;margin-bottom:6px;overflow:hidden}
.ex-head{padding:13px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.ex-body{display:none;padding:0 15px 14px;border-top:0.5px solid var(--bdr)}
.ex-body.open{display:block}
.step{display:flex;gap:8px;margin-bottom:5px;font-size:13px;line-height:1.6;color:var(--txt2)}
.sn{color:var(--txt3);min-width:14px;font-size:11px;margin-top:2px}
.tip{background:var(--bg3);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--txt2);margin-top:8px}
.yt{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;border-radius:20px;background:rgba(200,30,30,0.08);border:0.5px solid rgba(200,30,30,0.3);text-decoration:none;color:var(--txt);white-space:nowrap;margin-top:10px}
.tm-btn{flex:1;border-radius:20px;font-size:12px;padding:8px 8px}
.tm-work{background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)}
.tm-rest{background:rgba(100,100,120,0.1);border-color:rgba(100,100,120,0.25);color:var(--txt2)}
.done-big{width:100%;padding:15px;font-size:15px;font-weight:500;border-radius:14px;margin:10px 0;background:var(--acc2);border:none;color:#fff}
.done-big.done{background:var(--acc-bg);border:0.5px solid var(--acc-bd);color:var(--acc)}
.food-chip{padding:7px 13px;border-radius:20px;font-size:13px;background:var(--bg2);border:0.5px solid var(--bdr2);color:var(--txt2)}
.food-item{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:var(--bg2);border-radius:10px;margin-bottom:4px;font-size:13px}
.rm{border:none;background:transparent;color:var(--txt3);font-size:14px;padding:2px 6px;cursor:pointer}
.card{background:var(--bg2);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.sec{font-size:12px;font-weight:500;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin:16px 0 8px}
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:4px 11px;font-size:12px;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--txt2)}

/* Timer */
#tw{display:none;position:fixed;bottom:70px;right:0;left:0;max-width:640px;margin:auto;padding:0 14px;z-index:98}
#tw-inner{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:18px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 16px rgba(60,30,10,0.12)}
#tw-num{font-size:48px;font-weight:700;letter-spacing:-2px;line-height:1;color:var(--acc)}
#tw-lbl{font-size:11px;color:var(--txt3);margin-bottom:3px}

/* Guided */
#gw{display:none;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:14px;padding:14px 16px;margin-bottom:8px}

/* Progress */
.stat{background:var(--bg2);border-radius:12px;padding:14px;text-align:center}
.stat-n{font-size:26px;font-weight:600;color:var(--acc)}
.stat-l{font-size:11px;color:var(--txt3);margin-top:2px}
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:6px 0 14px}
.pbf{height:100%;background:var(--acc2);border-radius:3px}
.hmc{height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--txt3)}

/* Fullscreen timer overlay */
#tov{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,5,8,0.98);backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:24px}
#tov.on{display:flex}
#tov-ctx{font-size:15px;color:var(--acc);font-weight:500;letter-spacing:.3px}
#tov-ring{position:relative;width:min(74vw,300px);aspect-ratio:1}
#tov-ring svg{width:100%;height:100%}
#tov-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(56px,18vw,92px);font-weight:700;letter-spacing:-3px;color:#fff}
#tov-name{font-size:16px;color:var(--txt2);text-align:center;max-width:90%}
#tov-ctrls{display:flex;gap:14px;align-items:center}
#tov-ctrls button{width:64px;height:64px;border-radius:50%;font-size:16px;font-weight:600;background:var(--bg2);border:0.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center}
#tov-pause{font-size:24px!important}
#tov-skip{padding:13px 30px;border-radius:24px;font-size:15px;font-weight:500;background:var(--acc2);border:none;color:#fff}

/* Progress photo prompt */
#pp{display:none;position:fixed;inset:0;z-index:210;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:24px}
#pp.on{display:flex}
#pp-card{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:22px;padding:26px 22px;text-align:center;max-width:340px;width:100%}
#pp-emoji{font-size:46px;margin-bottom:6px}
#pp-title{font-size:18px;font-weight:600;margin-bottom:6px}
#pp-sub{font-size:13px;color:var(--txt2);margin-bottom:18px;line-height:1.5}
#pp-shot{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:500;background:var(--acc2);border:none;color:#fff;margin-bottom:8px}
#pp-vid{width:100%;padding:13px;border-radius:14px;font-size:15px;font-weight:500;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--txt);margin-bottom:8px}
#pp-later{width:100%;padding:11px;border-radius:14px;font-size:13px;color:var(--txt3);background:transparent;border:none}
#pp-thumb img,#pp-thumb video{width:100%;border-radius:14px;margin-top:12px}
.ph-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.7);pointer-events:none}
#mv{display:none;position:fixed;inset:0;z-index:220;background:rgba(0,0,0,0.92);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:18px}
#mv.on{display:flex}
#mv-close{position:absolute;top:16px;left:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:16px}

/* Water + notes + badges */
.wbtn{width:42px;height:42px;border-radius:50%;font-size:20px;font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:0.5px solid var(--bdr2);color:var(--acc)}
.note-chip{padding:7px 13px;border-radius:20px;font-size:13px;background:var(--bg2);border:0.5px solid var(--bdr2);color:var(--txt2)}
.note-chip.on{background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)}
.badge{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;background:var(--bg2);border:0.5px solid var(--bdr);text-align:center}
.badge.lk{opacity:.35;filter:grayscale(1)}
.badge-i{font-size:26px;line-height:1}
.badge-t{font-size:9px;color:var(--txt3);line-height:1.2}
.badge.un .badge-t{color:var(--acc)}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ph-cell{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg3)}
.ph-cell img{width:100%;height:100%;object-fit:cover}
.ph-day{position:absolute;bottom:0;right:0;left:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));color:#fff;font-size:9px;padding:8px 5px 3px;text-align:center}
.ph-del{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
.ph-star{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;color:#EFC04B;font-size:12px;display:flex;align-items:center;justify-content:center}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:215;overflow:hidden}
.cft{position:absolute;width:9px;height:14px;top:-20px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(104vh) rotate(720deg);opacity:.9}}
.dino-hero{position:relative;border-radius:16px;overflow:hidden;margin-bottom:10px;min-height:176px;background:#171018}
.dino-hero.dino-tap{cursor:pointer}
.dino-hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.dino-hero .fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.06),rgba(0,0,0,.32) 42%,rgba(0,0,0,.82) 80%,var(--bg))}
.dino-hero .inr{position:relative;padding:14px}
.dino-play-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:30px;color:rgba(255,255,255,.45);pointer-events:none;animation:playPulse 2.2s ease-in-out infinite;text-shadow:0 2px 10px rgba(0,0,0,.5)}
@keyframes playPulse{0%,100%{opacity:.25;transform:translate(-50%,-60%) scale(1)}50%{opacity:.6;transform:translate(-50%,-60%) scale(1.18)}}
.dino-badge{display:inline-flex;align-items:baseline;gap:5px;margin-top:11px;background:rgba(0,0,0,.42);border-radius:20px;padding:5px 11px}
.dino-badge .nm{color:#fff;font-size:12.5px;font-weight:600}
.dino-badge .sub{color:rgba(255,255,255,.85);font-size:11px}
.dino-bar{height:5px;background:rgba(255,255,255,.28);border-radius:3px;overflow:hidden;margin-top:9px;max-width:230px}
.dino-bar>i{display:block;height:100%;background:linear-gradient(90deg,#FF8A66,#FFC371);border-radius:3px;transition:width .6s}
.wk-mode{position:fixed;inset:0;bottom:calc(68px + env(safe-area-inset-bottom,0px));background:var(--bg3);z-index:10;display:flex;flex-direction:column;padding:14px 14px 10px;overflow-y:auto}
</style>
</head>
<body>

<div id="pg-today"></div>
<div id="pg-nutr" style="display:none"></div>
<div id="pg-metrics" style="display:none"></div>
<div id="pg-prog" style="display:none"></div>

<!-- Fullscreen timer -->
<div id="tov">
  <div id="tov-ctx"></div>
  <div id="tov-ring">
    <svg viewBox="0 0 220 220">
      <circle cx="110" cy="110" r="100" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="11"/>
      <circle id="tov-arc" cx="110" cy="110" r="100" fill="none" stroke="var(--acc2)" stroke-width="11" stroke-linecap="round" transform="rotate(-90 110 110)" stroke-dasharray="628" stroke-dashoffset="0"/>
    </svg>
    <div id="tov-num">0</div>
  </div>
  <div id="tov-name"></div>
  <div id="tov-ctrls">
    <button onclick="adjTimer(-15)">−15</button>
    <button id="tov-pause" onclick="pauseTimer()">⏸</button>
    <button onclick="adjTimer(15)">+15</button>
  </div>
  <button id="tov-skip" onclick="skipTimer()">דלג ←</button>
</div>

<!-- Progress photo prompt -->
<div id="pp">
  <div id="pp-card">
    <div id="pp-emoji">🎉</div>
    <div id="pp-title">כל הכבוד! סיימת את האימון</div>
    <div id="pp-sub">צלם תמונת התקדמות — ככה תראה את השינוי בגוף לאורך הזמן.</div>
    <button id="pp-shot" onclick="pickPhoto()">📸 צלם תמונה</button>
    <button id="pp-vid" onclick="pickVideo()">🎥 צלם סרטון</button>
    <button id="pp-later" onclick="closePP()">אחר כך</button>
    <div id="pp-thumb"></div>
  </div>
</div>
<input type="file" accept="image/*" capture="user" id="photo-input" style="display:none" onchange="handlePhotoPick(this)">
<input type="file" accept="video/*" capture="user" id="video-input" style="display:none" onchange="handleVideoPick(this)">
<div id="mv" onclick="if(event.target.id==='mv'||event.target.id==='mv-close')closeMV()">
  <button id="mv-close" onclick="closeMV()">✕</button>
  <div id="mv-content"></div>
</div>
<div id="confetti"></div>

<div class="tab-bar">
  <button class="tb on" id="btn-today" onclick="gotoTab('today')"><span class="tbi">🏋️</span>האימון</button>
  <button class="tb" id="btn-nutr" onclick="gotoTab('nutr')"><span class="tbi">🍎</span>תזונה</button>
  <button class="tb" id="btn-metrics" onclick="gotoTab('metrics')"><span class="tbi">📈</span>מדדים</button>
  <button class="tb" id="btn-prog" onclick="gotoTab('prog')"><span class="tbi">📊</span>התקדמות</button>
  <button class="tb" id="btn-gallery" onclick="location.href='gallery.html'"><span class="tbi">🔍</span>גלריה</button>
</div>

<script>
const SCHED=[
  {d:1,t:'upper',wk:1},{d:2,t:'lower',wk:1},{d:3,t:'core',wk:1},{d:4,t:'rest',wk:1},
  {d:5,t:'upper',wk:1},{d:6,t:'lower',wk:1},{d:7,t:'core',wk:1},
  {d:8,t:'rest',wk:2},{d:9,t:'upper',wk:2},{d:10,t:'lower',wk:2},{d:11,t:'core',wk:2},
  {d:12,t:'rest',wk:2},{d:13,t:'upper',wk:2},{d:14,t:'lower',wk:2},
  {d:15,t:'core',wk:3},{d:16,t:'rest',wk:3},{d:17,t:'upper',wk:3},{d:18,t:'lower',wk:3},
  {d:19,t:'core',wk:3},{d:20,t:'rest',wk:3},{d:21,t:'upper',wk:3},
  {d:22,t:'lower',wk:4},{d:23,t:'core',wk:4},{d:24,t:'rest',wk:4},{d:25,t:'upper',wk:4},
  {d:26,t:'lower',wk:4},{d:27,t:'core',wk:4},{d:28,t:'rest',wk:4},
  {d:29,t:'upper',wk:4},{d:30,t:'lower',wk:4}
];
const TNAMES={upper:'גוף עליון',lower:'גוף תחתון',core:'ליבה',rest:'מנוחה אקטיבית'};
const TEMOJI={upper:'💪',lower:'🦵',core:'⚡',rest:'🧘'};
const FOODS=['ביצים','קוטג׳','לחם','אורז','עוף','שיבולת שועל','בננה','טונה','גבינה','פסטה'];
const NOTES=['💪 מלא אנרגיה','🔥 אימון מעולה','✅ הגב הרגיש טוב','😮‍💨 היה קשה','📈 התחזקתי','😴 הייתי עייף','⚠️ כאב גב','⏱️ קצר היום'];
const WARMUP=[{n:'קפיצות במקום',t:30},{n:'מעגולי ידיים',t:20},{n:'מעגולי ירכיים',t:20},{n:'Cat-cow',t:30},{n:'Leg swings',t:20}];
const WKT={
  upper:[
    {n:'שכיבות שמיכה',m:'חזה · טריצפס · כתפיים',
     v:[['3×5','25ש׳','45ש׳'],['3×8','25ש׳','45ש׳'],['3×10','30ש׳','45ש׳']],
     steps:['שכב, ידיים מתחת לכתפיים ברוחב כתפיים','גוף ישר מהראש עד העקבים','רד עד שהחזה כמעט נוגע ברצפה','דחוף חזרה'],
     tip:'קשה? עשה על הברכיים — לגיטימי',yt:'https://www.youtube.com/watch?v=oUvdtkhBMZ4',
     gif:'gifs/0662.gif'},
    {n:'Pike push-up',m:'כתפיים · טריצפס',
     v:[['2×5','25ש׳','45ש׳'],['2×7','25ש׳','45ש׳'],['3×7','30ש׳','45ש׳']],
     steps:['ידיים ורגליים על הרצפה, ישבן גבוה — צורת V הפוך','כופף מרפקים, הורד ראש בין הידיים','דחוף חזרה'],
     tip:'ישבן גבוה יותר = יותר עומס על הכתפיים',yt:'https://www.youtube.com/watch?v=paCOGgmLCA0',
     gif:'gifs/pike.gif'},
    {n:'Shoulder taps',m:'כתפיים · ליבה',
     v:[['2×6/צד','30ש׳','40ש׳'],['3×8/צד','35ש׳','40ש׳'],['3×10/צד','40ש׳','40ש׳']],
     steps:['תנוחת שכיבות שמיכה','הרם יד ימין וגע בכתף שמאל','חזור, ואז יד שמאל לכתף ימין','קצב איטי — לא לנדנד את האגן'],
     tip:'פרוש רגליים רחב יותר לשיווי משקל',yt:'https://www.youtube.com/results?search_query=shoulder+taps+exercise+beginner',
     gif:'gifs/3699.gif'},
    {n:'Superman hold ⚠️',m:'גב תחתון · ישבן · גב עליון',
     v:[['2×8ש׳','35ש׳','30ש׳'],['3×10ש׳','40ש׳','30ש׳'],['3×12ש׳','45ש׳','30ש׳']],
     steps:['שכב פנים למטה, ידיים מושטות קדימה','הרם ידיים, חזה ורגליים בו-זמנית','הסתכל למטה — אל תסחוב הצוואר','החזק, נשום, תרד לאט'],
     tip:'כאב גב עליון? שים ידיים לצדדים בצורת T',yt:'https://www.youtube.com/results?search_query=superman+hold+exercise+beginner',
     gif:'gifs/0489.gif'},
    {n:'Diamond push-up',m:'טריצפס · חזה פנימי — שבוע 4 בלבד',
     v:[null,null,['2×5','25ש׳','45ש׳']],
     steps:['ידיים קרובות, אגודל ואצבע מורה נוגעים — יהלום','רד לאט, מרפקים קרוב לגוף','דחוף חזרה'],
     tip:'קשה יותר מרגיל — זה נורמלי',yt:'https://www.youtube.com/results?search_query=diamond+push+up+tutorial+beginner',
     gif:'gifs/0283.gif'}
  ],

// ── Timer ─────────────────────────────────────────────
function parseSec(s){const m=(s||'').match(/\d+/);return m?+m[0]:0;}
let _tmr={id:null,sec:0,total:0,cb:null,paused:false};
function beep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.18,0.36].forEach(t=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0,ac.currentTime+t);
      g.gain.linearRampToValueAtTime(0.35,ac.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.28);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.35);
    });
  }catch(e){}
}
const _ARC=628; // 2·π·100
function _renderTmr(){
  const el=document.getElementById('tov-num');
  el.textContent=_tmr.sec;
  el.style.color=_tmr.sec<=5?'#E24B4A':_tmr.sec<=10?'#EF9F27':'#fff';
  const arc=document.getElementById('tov-arc');
  const frac=_tmr.total>0?_tmr.sec/_tmr.total:0;
  arc.style.strokeDashoffset=(_ARC*(1-frac)).toFixed(1);
  arc.style.stroke=_tmr.sec<=5?'#E24B4A':_tmr.sec<=10?'#EF9F27':'var(--acc2)';
}
function stopTimer(){
  if(_tmr.id){clearInterval(_tmr.id);_tmr.id=null;}
  _tmr.cb=null;_tmr.paused=false;
  document.getElementById('tov').classList.remove('on');
}
function startTimer(sec,ctx,cb,name){
  if(_tmr.id)clearInterval(_tmr.id);
  _tmr={id:null,sec:sec,total:sec,cb:cb||null,paused:false};
  document.getElementById('tov-ctx').textContent=ctx||'';
  document.getElementById('tov-name').textContent=name||'';
  document.getElementById('tov-pause').textContent='⏸';
  document.getElementById('tov').classList.add('on');
  _renderTmr();
  _tmr.id=setInterval(()=>{
    if(_tmr.paused)return;
    _tmr.sec--;
    if(_tmr.sec<=0){
      _tmr.sec=0;_renderTmr();
      const fn=_tmr.cb;_tmr.cb=null;
      clearInterval(_tmr.id);_tmr.id=null;
      document.getElementById('tov').classList.remove('on');
      beep();if(fn)fn();
    }else _renderTmr();
  },1000);
}
function pauseTimer(){_tmr.paused=!_tmr.paused;document.getElementById('tov-pause').textContent=_tmr.paused?'▶':'⏸';}
function adjTimer(n){_tmr.sec=Math.max(1,_tmr.sec+n);if(_tmr.sec>_tmr.total)_tmr.total=_tmr.sec;_renderTmr();}
function skipTimer(){const fn=_tmr.cb;_tmr.cb=null;if(_tmr.id){clearInterval(_tmr.id);_tmr.id=null;}_tmr.paused=false;document.getElementById('tov').classList.remove('on');if(fn)fn();}

let G={on:false,exs:[],ei:0,si:0};
function gCurV(){return G.exs[G.ei].v;}
function gCurName(){return G.exs[G.ei].ex.n;}
function gSetCount(){const m=gCurV()[0].match(/^(\d+)/);return m?+m[1]:3;}
// parse a variant into {reps, timed, hold, rest}
function gParse(){
  const v=gCurV();const repsPart=(v[0].split('×')[1]||v[0]).trim();
  const timed=/ש/.test(repsPart);
  return {reps:repsPart,timed,hold:parseSec(repsPart),rest:parseSec(v[2])};
}
function updateGW(){
  if(!G.on)return;
  const total=gSetCount();const p=gParse();
  const info=document.getElementById('gw-info');
  const name=document.getElementById('gw-name');
  const tgt=document.getElementById('gw-target');
  const btn=document.getElementById('gw-btn');
  const wrap=document.getElementById('gw-gif-wrap');
  const img=document.getElementById('gw-gif');
  if(!btn)return;
  if(info)info.textContent=`תרגיל ${G.ei+1}/${G.exs.length} · סט ${G.si+1}/${total}`;
  if(name)name.textContent=gCurName();
  if(tgt)tgt.textContent=p.timed?`🧘 החזק ${p.reps}`:`💪 ${p.reps} חזרות`;
  btn.textContent=p.timed?`▶ התחל החזקה (${p.hold}ש׳)`:'✓ סיימתי סט';
  btn.onclick=p.timed?gDoTimed:gAfterSet;
  const gif=G.exs[G.ei].ex.gif;
  if(gif&&wrap&&img){wrap.style.display='block';img.src=gif;}
  else if(wrap)wrap.style.display='none';
}
function startGuided(){
  const d=viewDay||getDay();const {t}=SCHED[d-1];
  if(t==='rest')return;
  const list=dayExercises(d);if(!list.length)return;
  G={on:true,exs:list,ei:0,si:0};
  renderWorkoutMode();
}
function stopGuided(){G.on=false;stopTimer();renderToday();}
function renderWorkoutMode(){
  document.getElementById('pg-today').innerHTML=`
    <div class="wk-mode">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 12px">
        <div id="gw-info" style="font-size:12px;color:var(--txt3)"></div>
        <button onclick="stopGuided()" style="border:none;background:transparent;color:var(--txt3);font-size:13px;padding:4px 8px">✕ עצור</button>
      </div>
      <div id="gw-gif-wrap" style="border-radius:14px;overflow:hidden;background:var(--bg3);border:0.5px solid var(--bdr);margin-bottom:16px;flex-shrink:0">
        <img id="gw-gif" src="" style="width:100%;max-height:240px;object-fit:contain;display:block">
      </div>
      <div id="gw-name" style="font-size:26px;font-weight:700;margin-bottom:6px;line-height:1.2"></div>

      <div style="flex:1"></div>

    </div>`;
  updateGW();
}
function gDoTimed(){
  const p=gParse();
  startTimer(p.hold,`סט ${G.si+1} · החזקה`,gAfterSet,gCurName());
}
function gAfterSet(){
  const total=gSetCount();
  const lastSet=G.si>=total-1, lastEx=G.ei>=G.exs.length-1;
  if(lastSet&&lastEx){gFinish();return;}
  const p=gParse();
  startTimer(p.rest,`סט ${G.si+1}/${total} · מנוחה 💤`,gAdvance,gCurName());
}
function gAdvance(){
  const total=gSetCount();
  if(G.si<total-1)G.si++; else {G.ei++;G.si=0;}
  updateGW();
}
function gFinish(){
  G.on=false;
  const d=viewDay||getDay();const log=getLog(d);
  if(!log.done){log.done=true;log.doneAt=Date.now();save();}
  renderToday();
  celebrate();publishStats();
  setTimeout(()=>promptProgressPhoto(true),700);
}

// ── Data ──────────────────────────────────────────────
let data={startDate:null,logs:{},wt:[]};
const LS=(()=>{
  let mem={},ok=true;
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');}catch(e){ok=false;}
  return{
    get:k=>{try{return ok?localStorage.getItem(k):(k in mem?mem[k]:null);}catch(e){return k in mem?mem[k]:null;}},
    set:(k,v)=>{try{ok?localStorage.setItem(k,v):(mem[k]=v);}catch(e){mem[k]=v;}}
  };
})();
function load(){try{const s=LS.get('myfit2');if(s)data=JSON.parse(s);}catch(e){}if(!data.round)data.round=1;}
function save(){try{LS.set('myfit2',JSON.stringify(data));}catch(e){}}
function getDay(){
  if(!data.startDate){data.startDate=new Date().toISOString().split('T')[0];save();}
  const diff=Math.floor((Date.now()-new Date(data.startDate))/86400000)+1;
  return Math.min(30,Math.max(1,diff));
}
// round 1 keeps plain day keys (backward-compat); round 2+ uses prefixed keys
function logKey(d){return (data.round||1)>1?('r'+data.round+'_'+d):String(d);}
function getLog(d){const k=logKey(d);let l=data.logs[k];if(!l)l=data.logs[k]={done:false,food:[]};if(!l.skip)l.skip={};if(!l.ov)l.ov={};return l;}
function getStreak(){let s=0;const d=getDay();for(let i=d;i>=1;i--){if(getLog(i).done)s++;else break;}return s;}
// difficulty variant — round 2+ always uses the hardest variant
function curVi(d){const {wk}=SCHED[d-1];const b=wk<=2?0:wk===3?1:2;return (data.round||1)>1?2:b;}
function exVar(ex,vi){return ex.v[vi]||ex.v.find(x=>x);}
// resolved exercises for a day, honoring skip + swap overrides
function dayExercises(d){
  const {t}=SCHED[d-1];if(t==='rest')return [];
  const vi=curVi(d);const log=getLog(d);const out=[];
  WKT[t].forEach((ex,i)=>{
    if(log.skip[i])return;
    const useEx=(log.ov[i]!=null)?WKT[t][log.ov[i]]:ex;
    const v=exVar(useEx,vi);if(!v)return;
    out.push({ex:useEx,v,slot:i});
  });
  return out;
}

      }

      const isTimed=/ש/.test(repsPart);const hold=parseSec(repsPart);
      const swapList=WKT[t].map((alt,j)=>j===i?'':`<button onclick="swapEx(${d},${i},${j})" style="display:block;width:100%;text-align:right;margin-bottom:4px;font-size:12px;padding:8px 12px;border-radius:10px;background:var(--bg3);border-color:var(--bdr2)">${alt.n}</button>`).join('');
      h+=`<div class="ex-row" id="${id}">
        <div class="ex-head" onclick="toggleEx('${id}')">
          <div style="flex:1">

  // Done button

      <button onclick="newRound()" style="width:100%;padding:12px;border-radius:12px;font-weight:500;background:var(--acc2);border:none;color:#fff">🔁 התחל מחזור חדש</button>

  // Daily notes (Workout related notes)
  h+=`<div class="sec">📝 איך היה האימון?</div>
  <div class="card">
    <div style="display:flex;gap:6px;flex-wrap:wrap">

// ── Progress photos (IndexedDB) ───────────────────────
function _openDB(){return new Promise((res,rej)=>{try{const r=indexedDB.open('karbyfit',1);r.onupgradeneeded=()=>r.result.createObjectStore('photos',{keyPath:'id',autoIncrement:true});r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}catch(e){rej(e);}});}
async function addMedia(kind,payload){try{const db=await _openDB();await new Promise((res,rej)=>{const tx=db.transaction('photos','readwrite');tx.objectStore('photos').add({ts:Date.now(),round:data.round||1,day:viewDay||getDay(),kind,data:payload});tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});return true;}catch(e){return false;}}
async function getPhotos(){try{const db=await _openDB();const arr=await new Promise(res=>{const tx=db.transaction('photos','readonly');const q=tx.objectStore('photos').getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([]);});return arr.map(r=>{const val=r.data!=null?r.data:r.img;return {id:r.id,ts:r.ts,day:r.day,kind:r.kind||'photo',data:val,img:val};});}catch(e){return [];}}
async function delPhoto(id){if(!confirm('למחוק את הפריט?'))return;try{const db=await _openDB();await new Promise(res=>{const tx=db.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=res;tx.onerror=res;});}catch(e){}renderPhotos();}
function compressImg(file,max){return new Promise((res,rej)=>{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const cv=document.createElement('canvas');let{width:w,height:hh}=img;if(w>max||hh>max){const s=max/Math.max(w,hh);w=Math.round(w*s);hh=Math.round(hh*s);}cv.width=w;cv.height=hh;cv.getContext('2d').drawImage(img,0,0,w,hh);URL.revokeObjectURL(url);res(cv.toDataURL('image/jpeg',0.8));};img.onerror=rej;img.src=url;});}
function readDataURL(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(file);});}
function pickPhoto(){document.getElementById('photo-input').click();}
function pickVideo(){document.getElementById('video-input').click();}

  data.featured[dt.getFullYear()+'-'+dt.getMonth()]=id;save();

// ── Yearly calendar ───────────────────────────────────
const MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
async function renderYearCalendar(){
  const el=document.getElementById('yc-wrap');if(!el)return;
  const photos=await getPhotos();
  const year=new Date().getFullYear(),nowM=new Date().getMonth();
  const cnt={};
  Object.values(data.logs).forEach(l=>{if(!l.done||!l.doneAt)return;const dt=new Date(l.doneAt);if(dt.getFullYear()===year)cnt[dt.getMonth()]=(cnt[dt.getMonth()]||0)+1;});
  const onlyPhotos=photos.filter(p=>p.kind!=='video');
  const photoForMonth=m=>{
    const key=year+'-'+m;
    if(data.featured&&data.featured[key]!=null){const f=onlyPhotos.find(p=>p.id===data.featured[key]);if(f)return f;}
    const inM=onlyPhotos.filter(p=>{const dt=new Date(p.ts);return dt.getFullYear()===year&&dt.getMonth()===m;});
    return inM.length?inM[inM.length-1]:null;
  };
  let h='';
  for(let m=0;m<12;m++){
    const c=cnt[m]||0,ph=photoForMonth(m);
    if(m>nowM&&c===0&&!ph)continue;
    h+=`<div style="display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:0.5px solid var(--bdr)">
      <div style="width:50px;height:50px;border-radius:11px;overflow:hidden;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center">${ph?`<img src="${ph.img}" style="width:100%;height:100%;object-fit:cover">`:'<span style="font-size:18px;opacity:.35">📷</span>'}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:500">${MONTHS[m]}${m===nowM?' <span style="font-size:10px;color:var(--acc)">• החודש</span>':''}</div><div style="font-size:11px;color:var(--txt3)">${c} אימונים</div></div>
      <div style="width:64px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--acc2);width:${Math.min(100,Math.round(c/15*100))}%"></div></div>
    </div>`;
  }
  el.innerHTML=h||`<div style="font-size:12px;color:var(--txt3)">היומן יתמלא ככל שתתאמן ותצלם לאורך החודשים 📅</div>`;
}

function getAchievements(){
  const done=Object.values(data.logs).filter(l=>l.done).length;
  const streak=getStreak();
  const fullWeek=[1,2,3,4].some(w=>SCHED.filter(s=>s.wk===w).every(s=>getLog(s.d).done));
  const hasNote=Object.values(data.logs).some(l=>(l.notes||[]).length);
  return [

// ── Dino pet: 10 stages by THIS month's workouts (resets monthly) ──
const DINO_T=[0,1,2,3,5,8,11,14,18,22]; // min workouts for stage 1..10
const DINO_NM=['הביצה ישנה 🥚','הביצה נסדקה!','מציץ החוצה 👀','בקע! 🐣','תינוק דינו','דינו צעיר','דינו נער','דינו בוגר 💪','טיטאן! 🦖','אלוף! 👑'];
function dinoMonth(){const y=new Date().getFullYear(),m=new Date().getMonth();let n=0;Object.values(data.logs).forEach(l=>{if(l.done&&l.doneAt){const dt=new Date(l.doneAt);if(dt.getFullYear()===y&&dt.getMonth()===m)n++;}});return n;}
function dinoStage(n){let s=0;for(let i=0;i<DINO_T.length;i++)if(n>=DINO_T[i])s=i;return s;} // 0..9
function dinoData(){
  const n=dinoMonth(),s=dinoStage(n),file=String(s+1).padStart(2,'0');
  const next=s<9?DINO_T[s+1]:null,left=next!==null?next-n:0;
  const sub=next!==null?`עוד ${left} ${left===1?'אימון':'אימונים'} והוא יתפתח →`:'הגעת לשיא! 🏆';
  const lo=DINO_T[s],hi=next!==null?next:lo+1;
  const pct=next!==null?Math.round((n-lo)/(hi-lo)*100):100;
  return {file,name:DINO_NM[s],sub,pct,n};
}

function weightChartSVG(){
  const pts=[...data.wt].map(p=>({...p,r:p.r||1})).sort((a,b)=>((a.r-1)*30+a.d)-((b.r-1)*30+b.d));
  if(pts.length<2)return '';
  const W=320,H=130,pad=26;
  const ws=pts.map(p=>p.w);
  const min=Math.min(...ws),max=Math.max(...ws),rng=(max-min)||1;
  const xy=pts.map((p,i)=>{
    const x=pad+(i/(pts.length-1))*(W-2*pad);
    const y=pad+(1-(p.w-min)/rng)*(H-2*pad);
    return [+x.toFixed(1),+y.toFixed(1)];
  });
  const poly=xy.map(p=>p.join(',')).join(' ');
  const area=`${pad},${H-pad} ${poly} ${(W-pad)},${H-pad}`;
  const dots=xy.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="var(--acc)"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <polygon points="${area}" fill="rgba(255,122,61,0.12)"/>
    <polyline points="${poly}" fill="none" stroke="var(--acc2)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${pad}" y="14" fill="var(--txt3)" font-size="10">${max} ק״ג</text>
    <text x="${pad}" y="${H-6}" fill="var(--txt3)" font-size="10">${min} ק״ג</text>
  </svg>`;
}

function downloadWaterCalendar() {
  const hours = [8, 10, 12, 14, 16, 18, 20];
  let ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//MyFit//Water Reminders//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH'
  ];
  
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  
  hours.forEach((h, idx) => {
    const startStr = `${y}${m}${d}T${String(h).padStart(2, '0')}0000`;
    const endStr = `${y}${m}${d}T${String(h).padStart(2, '0')}1500`;
    const stamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
    
    ics.push('BEGIN:VEVENT');
    ics.push(`UID:water-reminder-${h}-${idx}@myfit`);
    ics.push(`DTSTAMP:${stamp}`);
    ics.push(`DTSTART;TZID=Asia/Jerusalem:${startStr}`);
    ics.push(`DTEND;TZID=Asia/Jerusalem:${endStr}`);
    ics.push('RRULE:FREQ=DAILY');
    ics.push('SUMMARY:💧 זמן לשתות מים!');
    ics.push('DESCRIPTION:תזכורת יומית מאפליקציית הכושר שלי לשמור על רוויה.');
    ics.push('BEGIN:VALARM');
    ics.push('ACTION:DISPLAY');
    ics.push('DESCRIPTION:💧 זמן לשתות מים!');
    ics.push('TRIGGER:-PT0M');
    ics.push('END:VALARM');
    ics.push('END:VEVENT');
  });
  
  ics.push('END:VCALENDAR');
  
  const blob = new Blob([ics.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'water-reminders.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

        <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">👟 צעדים</div>
        <input type="number" placeholder="0" id="stin" style="width:100%;font-size:13px;padding:8px 10px" onchange="saveStepsMetrics(this.value)">
      </div>
      <div>
        <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">😴 שינה שע׳</div>
        <input type="number" step="0.5" placeholder="0" id="spin" style="width:100%;font-size:13px;padding:8px 10px" onchange="saveSleepMetrics(this.value)">
      </div>
    </div>
    <button id="hlth-btn-metrics" onclick="importFromHealthMetrics()" style="width:100%;padding:10px;border-radius:11px;font-size:13px;background:rgba(255,59,48,0.07);border-color:rgba(255,59,48,0.25);color:var(--txt2)">
      ❤️ ייבוא מ-Shortcuts של Apple
    </button>
  </div>`;
  
  // Height & BMI Card
  h+=`<div class="sec">⚖️ הרכב גוף ו-BMI</div>
  <div class="card" style="padding:14px 15px">`;
  if(!data.height){
    h+=`<div style="font-size:12px;color:var(--txt2);margin-bottom:8px">הזן את הגובה שלך (ס״מ) כדי לחשב BMI:</div>
      <div style="display:flex;gap:6px">
        <input type="number" id="hin" placeholder="לדוגמה 178" style="flex:1">
        <button onclick="saveHeightMetrics(document.getElementById('hin').value)" style="background:var(--acc2);border:none;color:#fff;padding:10px 16px">שמור</button>
      </div>`;
  } else if(!lastWt){
    h+=`<div style="font-size:12px;color:var(--txt2)">גובה: ${data.height} ס״מ. הזן משקל למעלה כדי לחשב את מדד ה-BMI שלך. <button onclick="data.height=null;save();renderMetrics()" style="font-size:11px;padding:3px 8px;border-radius:14px;margin-right:6px">שנה גובה</button></div>`;
  } else {
    const bmi=lastWt/Math.pow(data.height/100,2);
    const cat=bmi<18.5?['תת-משקל','#EF9F27']:bmi<25?['תקין','#5BD17F']:bmi<30?['עודף משקל','#EF9F27']:['השמנה','#E24B4A'];
    h+=`<div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:30px;font-weight:700;color:${cat[1]}">${bmi.toFixed(1)}</div>
        <div style="font-size:12px;color:${cat[1]}">${cat[0]}</div>
      </div>
      <div style="text-align:left;font-size:11px;color:var(--txt3)">
        משקל: ${lastWt} ק״ג<br>
        גובה: ${data.height} ס״מ<br>
        <button onclick="data.height=null;save();renderMetrics()" style="font-size:11px;padding:3px 8px;border-radius:14px;margin-top:6px">שנה גובה</button>
      </div>
    </div>`;
  }
  h+='</div>';
  
  // Beginner Nutrition & Health Guide (מדריך תזונה ובריאות למתחילים)
  h+=`<div class="sec">📖 מדריך בריאות ותזונה למתחילים</div>
  
  <!-- TDEE Guide Card -->
  <div class="card" style="margin-bottom:8px">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="font-size:20px;">⚖️</span>
      <div style="font-size:14px; font-weight:600; color:var(--acc)">מה זה TDEE ואיך הגוף שורף קלוריות?</div>
    </div>
    <div style="font-size:12px; color:var(--txt2); line-height:1.6; display:flex; flex-direction:column; gap:6px;">
      <p>הגוף שלך שורף קלוריות בכל שניה כדי להתקיים (נשימה, זרימת דם וכו') - זה נקרא BMR.</p>
      <p>כאשר מוסיפים לזה את הפעילות היומית (צעדים, אימונים, עבודה), מתקבל ה-<b>TDEE</b>: סך כל האנרגיה שהגוף שלך מוציא ביממה.</p>
      <div style="background:var(--bg3); border-radius:8px; padding:8px 10px; font-size:11px; color:var(--acc); margin-top:4px;">
        💡 <b>נוסחה קלה להערכה:</b> משקל הגוף שלך כפול 30 עד 33 ייתן את כמות הקלוריות שאתה שורף ביום ממוצע.
      </div>
    </div>
  </div>

  <!-- Caloric Deficit/Surplus Guide Card -->
  <div class="card" style="margin-bottom:8px">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="font-size:20px;">🔥</span>
      <div style="font-size:14px; font-weight:600; color:var(--acc)">גרעון קלורי לעומת עודף קלורי</div>
    </div>
    <div style="font-size:12px; color:var(--txt2); line-height:1.6; display:flex; flex-direction:column; gap:6px;">
      <p>כדי לשנות את הרכב הגוף, עליך לשלוט במאזן הקלורי היומי בהתאם למטרה שלך:</p>
      <div style="display:flex; flex-direction:column; gap:6px; margin-top:4px;">
        <div style="padding:8px 10px; background:rgba(239,159,39,0.08); border:0.5px solid rgba(239,159,39,0.25); border-radius:8px;">
          <b style="color:#EF9F27;">📉 גרעון קלורי (חיטוב וירידה באחוז השומן):</b>
          <div style="margin-top:2px;">אכול פחות קלוריות ממה שאתה מוציא (כ-300-500 קלוריות פחות מה-TDEE). הגוף ייאלץ להשתמש בשומן כמקור אנרגיה.</div>
        </div>
        <div style="padding:8px 10px; background:rgba(91,209,127,0.08); border:0.5px solid rgba(91,209,127,0.25); border-radius:8px;">
          <b style="color:#5BD17F;">📈 עודף קלורי (מסה ובניית שריר):</b>
          <div style="margin-top:2px;">אכול מעט יותר ממה שאתה מוציא (עודף מבוקר של כ-200-300 קלוריות) לצד אימוני כוח כדי לתת לשריר דלק להיבנות.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Macros Guide Card -->
  <div class="card" style="margin-bottom:8px">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="font-size:20px;">🍗</span>
      <div style="font-size:14px; font-weight:600; color:var(--acc)">אבות המזון - מה מומלץ לאכול?</div>
    </div>
    <div style="font-size:12px; color:var(--txt2); line-height:1.6; display:flex; flex-direction:column; gap:6px;">
      <p>הקלוריות מחולקות לשלושה אבות מזון עיקריים שמרכיבים את התזונה שלנו:</p>
      <ul style="padding-right:16px; display:flex; flex-direction:column; gap:4px;">
        <li><b style="color:var(--txt);">חלבון (אבן הבניין של השריר):</b> הכי קריטי להתאוששות ובניית שריר. מומלץ לצרוך <b>1.6 עד 2.2 גרם</b> חלבון לכל ק"ג משקל גוף. (מקורות: ביצים, קוטג׳, עוף, טונה, בשר).</li>
        <li><b style="color:var(--txt);">פחמימות (הדלק של הגוף):</b> נותנות אנרגיה לאימונים קשים ושומרות על רמת הביצועים. (מקורות: שיבולת שועל, אורז, תפוחי אדמה, לחם מלא).</li>
        <li><b style="color:var(--txt);">שומנים בריאים (תפקוד הורמונלי):</b> חיוניים לייצור הורמונים בריאים, ספיגת ויטמינים ותפקוד המוח. (מקורות: טחינה, שמן זית, אבוקדו, אגוזים).</li>
      </ul>
    </div>
  </div>

  <!-- Hydration Guide Card -->
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="font-size:20px;">💦</span>
      <div style="font-size:14px; font-weight:600; color:var(--acc)">חשיבות המים והשינה להתאוששות</div>
    </div>
    <div style="font-size:12px; color:var(--txt2); line-height:1.6; display:flex; flex-direction:column; gap:6px;">
      <p>ללא מנוחה מספקת ושתייה, הגוף לא יוכל לבנות שריר או לשרוף שומן ביעילות:</p>
      <ul style="padding-right:16px; display:flex; flex-direction:column; gap:4px;">
        <li><b>מים:</b> מומלץ לשתות לפחות 2.5-3 ליטר ביום. מים עוזרים להעביר חומרי תזונה לשרירים ומונעים עייפות.</li>
        <li><b>שינה:</b> השריר נבנה בשינה ולא בזמן האימונים. כוון ל-7-8 שעות שינה איכותיות בלילה.</li>
      </ul>
    </div>
  </div>`;
  
  document.getElementById('pg-metrics').innerHTML=h;
  
  const wi=document.getElementById('wtin');if(wi&&log.wt)wi.value=log.wt;
  const si=document.getElementById('stin');if(si&&log.steps)si.value=log.steps;
  const spi=document.getElementById('spin');if(spi&&log.sleep)spi.value=log.sleep;
}

function saveWtMetrics(v) {
  saveWt(v);
}
function saveStepsMetrics(v) {
  saveSteps(v);
}
function saveSleepMetrics(v) {
  saveSleep(v);
}
function saveHeightMetrics(v) {
  data.height=v?parseFloat(v):null;
  save();
  renderMetrics();
}
async function importFromHealthMetrics() {
  try {
    const txt=await navigator.clipboard.readText();
    const p=JSON.parse(txt);
    const d=viewDay||getDay();
    if(p.weight){saveWt(p.weight); const wi=document.getElementById('wtin'); if(wi)wi.value=p.weight;}
    if(p.steps){saveSteps(p.steps); const si=document.getElementById('stin'); if(si)si.value=p.steps;}
    if(p.sleep){saveSleep(p.sleep); const spi=document.getElementById('spin'); if(spi)spi.value=p.sleep;}
    const btn=document.getElementById('hlth-btn-metrics');
    if(btn){
      btn.textContent='✅ יובא בהצלחה!';
      btn.style.color='var(--acc)';
      setTimeout(()=>{btn.textContent='❤️ ייבוא מ-Shortcuts של Apple'; btn.style.color='';},3000);
    }
    renderMetrics();
  } catch(e) {
    alert('הרץ קודם את הקיצור ב-iPhone ואז חזור ולחץ.');
  }
}

window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(r=>r.update()).catch(()=>{});});
}
try{load();renderToday();}catch(e){document.getElementById('pg-today').innerHTML='<div style="padding:20px;color:#f77;font-family:monospace;font-size:13px;white-space:pre-wrap">שגיאה: '+e.message+'<br><br>'+e.stack+'</div>';}
</script>
</body>
</html>
